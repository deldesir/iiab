---
# Defaults for the rapidpro role

python_version: "3.13.5"
rapidpro_db_name: "temba"
rapidpro_db_user: "temba"
rapidpro_db_pass: "temba"
nodejs_version: "24"
rapidpro_dir: "/opt/iiab/rapidpro"
rapidpro_install: True
rapidpro_enabled: True

admin_email: "admin@box.lan"
rapidpro_admin_password: ""

# Hostname Configuration
rapidpro_hostname: "{{ iiab_hostname }}"
rapidpro_http_protocol: "http"

rapidpro_url: /rp

# Bind the courier/mailroom PUBLIC web servers (channel-webhook receivers:
# courier :8080, mailroom :8090) to loopback only. Every client is local —
# wuzapi and the email-bridge POST to 127.0.0.1, and RapidPro talks to mailroom's
# separate INTERNAL server on 127.0.0.1:8091 — so loopback keeps these services
# off the LAN/WAN. Defense-in-depth: the IIAB firewall already drops the WAN at
# ports_externally_visible<3, and this additionally protects hotspot LANs
# (lan != none), where the all-interfaces default would otherwise be reachable.
# Set to "" (all interfaces) ONLY if you add an EXTERNAL webhook channel that
# must reach courier on the box's IP.
rapidpro_public_bind_address: "127.0.0.1"

rapidpro_drop_db_on_reinstall: false
rapidpro_force_drop_db: false

rapidpro_assets_url: "https://github.com/deldesir/rp-assets/raw/main/rapidpro-assets-{{ rapidpro_assets_version }}.tar.gz"
wuzapi_port: 8095

wuzapi_admintoken: ""
rapidpro_secret_key: ""
custom_ai_admin_token: ""

# AWS mode: set to false to disable S3 + DynamoDB and use local storage only
rapidpro_aws_enabled: false

# Domain for courier (used in attachment URLs)
rapidpro_domain: "{{ rapidpro_hostname }}"

# AWS Configuration (S3 + DynamoDB) — used when rapidpro_aws_enabled is true
rapidpro_aws_access_key_id: ""
rapidpro_aws_secret_access_key: ""
rapidpro_aws_region: "us-east-1"

# S3 bucket prefix — buckets: {prefix}-default, {prefix}-attachments, {prefix}-archives
rapidpro_s3_bucket_prefix: "temba"

# DynamoDB table prefix
rapidpro_dynamo_table_prefix: "Temba"

# Architecture mapping (follows kiwix/gitea pattern)
rapidpro_arch_dict:
  x86_64: amd64
  aarch64: arm64

rapidpro_go_arch: "{{ rapidpro_arch_dict.get(ansible_facts.machine, 'unsupported') }}"
