---
# Universal Binary Installation (VM & Android/Proot)

- name: Install Mailroom Binary from Release (26.1.75)
  get_url:
    url: "https://github.com/deldesir/mailroom/releases/download/v26.1.75/mailroom-linux-{{ rapidpro_go_arch }}"
    dest: /usr/local/bin/mailroom
    mode: '0755'
    force: yes
  become: yes

- name: Install Courier Binary from Release (26.1.17)
  get_url:
    url: "https://github.com/deldesir/courier/releases/download/v26.1.17/courier-linux-{{ rapidpro_go_arch }}"
    dest: /usr/local/bin/courier
    mode: '0755'
    force: yes
  become: yes
