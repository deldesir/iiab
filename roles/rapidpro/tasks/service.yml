---
# Service Management (Systemd vs PDSM)

# --- Systemd path (standard Linux) ---

- name: Systemd - Ensure Infrastructure Services are Running
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - postgresql
    - "{{ valkey_service_name }}"
    - rapidpro-dynamo
  become: yes
  when: not is_proot
  ignore_errors: yes

- name: Systemd - Force Restart RapidPro Services (Fresh Start)
  service:
    name: "{{ item }}"
    state: restarted
    enabled: yes
  loop:
    - rapidpro-gunicorn
    - rapidpro-courier
    - rapidpro-mailroom
    - rapidpro-celery
  become: yes
  when: not is_proot

# --- pdsm path (proot/Android) ---

- name: pdsm - Enable RapidPro Services (Android/Proot)
  command: /usr/local/bin/pdsm enable {{ item }}
  loop:
    - postgresql
    - valkey
    - rapidpro-dynamo
    - rapidpro-gunicorn
    - rapidpro-courier
    - rapidpro-mailroom
    - rapidpro-celery
  become: yes
  when: is_proot

- name: pdsm - Start Infrastructure Services (Android/Proot)
  command: /usr/local/bin/pdsm start {{ item }}
  loop:
    - postgresql
    - valkey
    - rapidpro-dynamo
  register: pdsm_infra_start
  changed_when: "'already running' not in pdsm_infra_start.stdout"
  become: yes
  when: is_proot

- name: Wait for Database Ready (All Platforms)
  wait_for:
    port: 5432
    host: 127.0.0.1
    timeout: 300

- name: pdsm - Start RapidPro Application Services (Android/Proot)
  command: /usr/local/bin/pdsm start {{ item }}
  loop:
    - rapidpro-gunicorn
    - rapidpro-courier
    - rapidpro-mailroom
    - rapidpro-celery
  register: pdsm_app_start
  changed_when: "'already running' not in pdsm_app_start.stdout"
  become: yes
  when: is_proot
