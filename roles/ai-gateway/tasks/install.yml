---
- name: Record (initial) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df1

- name: Install AI Gateway system dependencies
  apt:
    name:
      - git
      - libpq-dev
    state: present
  become: yes

- name: Ensure uv is installed
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ ai_gateway_uv_bin }}"
  become: yes

- name: Create AI Gateway directory
  file:
    path: "{{ ai_gateway_dir }}"
    state: directory
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    mode: '0755'
  become: yes

- name: Add AI Gateway directory to git safe directories
  community.general.git_config:
    name: safe.directory
    scope: global
    value: "{{ ai_gateway_dir }}"
  become: yes

# talkmaster + jwlinker are editable dependencies of the gateway (talk-prep
# chain: talksync, talkprep tools, S-34 imports). They must exist BEFORE
# `uv sync` or the editable sources fail to resolve. Clone-if-absent only —
# never reset an existing tree, which may carry local work.
- name: Clone TalkMaster library (if absent)
  shell: git clone --branch "{{ ai_gateway_talkmaster_version }}" --origin origin "{{ ai_gateway_talkmaster_repo }}" "{{ ai_gateway_talkmaster_dir }}"
  args:
    creates: "{{ ai_gateway_talkmaster_dir }}/.git"
  become: yes
  become_user: "{{ ai_gateway_user }}"

- name: Clone JWLinker library (if absent)
  shell: git clone --branch "{{ ai_gateway_jwlinker_version }}" --origin origin "{{ ai_gateway_jwlinker_repo }}" "{{ ai_gateway_jwlinker_dir }}"
  args:
    creates: "{{ ai_gateway_jwlinker_dir }}/.git"
  become: yes
  become_user: "{{ ai_gateway_user }}"

- name: Clone or Update AI Gateway repository
  shell: |
    if [ -d "{{ ai_gateway_dir }}/.git" ]; then
      cd "{{ ai_gateway_dir }}" && git fetch origin && git reset --hard origin/{{ ai_gateway_repo_version }}
    else
      git clone --branch "{{ ai_gateway_repo_version }}" --origin origin "{{ ai_gateway_repo }}" "{{ ai_gateway_dir }}"
    fi
  become: yes
  become_user: "{{ ai_gateway_user }}"
  notify: restart ai-gateway

- name: Set ownership of AI Gateway directory
  file:
    path: "{{ ai_gateway_dir }}"
    state: directory
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    recurse: yes
  become: yes

# V2: Recreate venv with the latest available Python.
# Hermes Agent requires >=3.11; this ensures the venv satisfies all deps.
# Must update .python-version first — uv reads this file and would refuse
# to sync if it conflicts with pyproject.toml's requires-python.
- name: Update .python-version to latest available Python
  copy:
    content: "3.14\n"
    dest: "{{ ai_gateway_dir }}/.python-version"
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    mode: '0644'
  become: yes

- name: Ensure AI Gateway venv uses latest available Python
  command: "{{ ai_gateway_uv_bin }} venv .venv --python 3.14 --clear"
  args:
    chdir: "{{ ai_gateway_dir }}"
  become: yes
  environment:
    PATH: "/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

- name: Install AI Gateway dependencies (uv sync)
  command: "{{ ai_gateway_uv_bin }} sync"
  args:
    chdir: "{{ ai_gateway_dir }}"
  become: yes
  environment:
    PATH: "/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

- name: Fix ownership after uv sync
  file:
    path: "{{ ai_gateway_dir }}"
    state: directory
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    recurse: yes
  become: yes

- name: Deploy AI Gateway environment file from local_vars.yml
  template:
    src: ai-gateway.env.j2
    dest: "{{ ai_gateway_dir }}/.env"
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    mode: '0600'
  become: yes
  notify: restart ai-gateway

# .env is regenerated on every run, so any secret that lives only there is
# one provisioning away from being lost. .env.local is the machine-local
# override file: created once if absent, NEVER overwritten by Ansible, and
# loaded after .env by both the systemd units (EnvironmentFile=-) and the
# app (load_dotenv override), so its values always win.
- name: Ensure machine-local env override file exists (never overwritten)
  copy:
    dest: "{{ ai_gateway_dir }}/.env.local"
    force: no
    content: |
      # Machine-local secrets and overrides — NEVER written by Ansible.
      # Loaded after .env (systemd EnvironmentFile order + app load_dotenv
      # override), so values here win. Put anything here that is set on this
      # box only and must survive `ansible-playbook` re-runs.
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    mode: '0600'
  become: yes

- name: Ensure AI Gateway data directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    mode: '0755'
  loop:
    - "{{ ai_gateway_dir }}/data/knowledge"
    - "{{ ai_gateway_hermes_home }}"
    - "{{ ai_gateway_mempalace_palace_path }}"
  become: yes

- name: Deploy TalkPrep knowledge file
  copy:
    src: talkprep-knowledge.md
    dest: "{{ ai_gateway_dir }}/data/knowledge/talkprep.md"
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    mode: '0644'
  become: yes

# V2: Seed SOUL.md identity file for Hermes Agent (§7.9 of architecture spec).
# Without this, Hermes uses its built-in "coding assistant" identity instead
# of the IIAB-specific WhatsApp assistant identity.
- name: Deploy SOUL.md identity for Hermes Agent
  copy:
    src: SOUL.md
    dest: "{{ ai_gateway_hermes_home }}/SOUL.md"
    owner: "{{ ai_gateway_user }}"
    group: "{{ ai_gateway_user }}"
    mode: '0644'
    force: no    # Don't overwrite if operator has customized it
  become: yes

- name: Install AI Gateway systemd service
  template:
    src: ai-gateway.service.j2
    dest: /etc/systemd/system/ai-gateway.service
    mode: '0644'
  become: yes
  notify: restart ai-gateway

- name: Install MemPalace compaction systemd service
  template:
    src: ai-gateway-compact.service.j2
    dest: /etc/systemd/system/ai-gateway-compact.service
    mode: '0644'
  become: yes

- name: Install MemPalace compaction systemd timer
  template:
    src: ai-gateway-compact.timer.j2
    dest: /etc/systemd/system/ai-gateway-compact.timer
    mode: '0644'
  become: yes

- name: Ensure MemPalace compaction timer is enabled and running
  systemd:
    name: ai-gateway-compact.timer
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes

- name: Install cognitive-pipeline job units (KG extract, KG->Wiki render, morning nudge, backup, radar, person sync, daily brief, synthesis)
  template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    mode: '0644'
  loop:
    - ai-gateway-kgextract.service
    - ai-gateway-kgextract.timer
    - ai-gateway-kgwiki.service
    - ai-gateway-kgwiki.timer
    - ai-gateway-nudge.service
    - ai-gateway-nudge.timer
    - ai-gateway-talksync.service
    - ai-gateway-talksync.timer
    - ai-gateway-radar.service
    - ai-gateway-radar.timer
    - ai-gateway-personsync.service
    - ai-gateway-personsync.timer
    - ai-gateway-dailybrief.service
    - ai-gateway-dailybrief.timer
    - ai-gateway-synthesis.service
    - ai-gateway-synthesis.timer
    - ai-gateway-weekly.service
    - ai-gateway-weekly.timer
    - second-brain-backup.service
    - second-brain-backup.timer
  become: yes

- name: Install pipeline maintenance scripts
  copy:
    src: "{{ item }}"
    dest: "/usr/local/sbin/{{ item }}"
    mode: '0755'
  loop:
    - second-brain-backup
    - jwlinker-refresh
    - hermes-elevate
  become: yes

# TOTP-gated root window for the chat assistant (hermes-elevate).
# Enrollment stays MANUAL and one-time: `hermes-elevate generate` as
# root writes the authenticator secret — the role never creates or
# rotates it.
- name: Allow the gateway user to reach the elevation wrapper
  copy:
    content: "iiab-admin ALL=(root) NOPASSWD: /usr/local/sbin/hermes-elevate\n"
    dest: /etc/sudoers.d/hermes-elevate
    mode: '0440'
    validate: 'visudo -cf %s'
  become: yes

- name: Ensure pipeline timers are enabled and running
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
    daemon_reload: yes
  loop:
    - ai-gateway-kgextract.timer
    - ai-gateway-kgwiki.timer
    - ai-gateway-nudge.timer
    - ai-gateway-talksync.timer
    - ai-gateway-radar.timer
    - ai-gateway-personsync.timer
    - ai-gateway-dailybrief.timer
    - ai-gateway-synthesis.timer
    - ai-gateway-weekly.timer
    - second-brain-backup.timer
  become: yes

# RECORD AI Gateway AS INSTALLED

- name: Record (final) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df2

# V2: Verify that Hermes Agent and MemPalace are importable after uv sync.
# This catches dependency conflicts early rather than at runtime.
# - name: Verify V2 imports (Hermes + MemPalace)
#   command: >
#     {{ ai_gateway_uv_bin }} run python -c
#     "from run_agent import AIAgent; from mempalace.mcp_server import tool_status; print('V2 imports OK')"
#   args:
#     chdir: "{{ ai_gateway_dir }}"
#   become: yes
#   register: verify_v2
#   failed_when: verify_v2.rc != 0

- name: Add 'ai_gateway_disk_usage = {{ df2.stdout | int - df1.stdout | int }}' to {{ iiab_ini_file }}
  ini_file:
    path: "{{ iiab_ini_file }}"
    section: ai-gateway
    option: ai_gateway_disk_usage
    value: "{{ df2.stdout | int - df1.stdout | int }}"

- name: "Set 'ai_gateway_installed: True'"
  set_fact:
    ai_gateway_installed: True

- name: "Add 'ai_gateway_installed: True' to {{ iiab_state_file }}"
  lineinfile:
    path: "{{ iiab_state_file }}"
    regexp: '^ai_gateway_installed'
    line: 'ai_gateway_installed: True'

