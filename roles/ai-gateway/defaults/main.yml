---
ai_gateway_install: True
ai_gateway_enabled: True

# Install location
ai_gateway_dir: /opt/iiab/ai-gateway

# uv binary path (IIAB Ansible runs as root)
ai_gateway_uv_bin: /root/.local/bin/uv

# Source repository
ai_gateway_repo: "https://github.com/deldesir/gateway.git"
ai_gateway_repo_version: "main"

# Domain libraries (cloned automatically by the role)
ai_gateway_talkmaster_repo: "https://github.com/deldesir/talkmaster.git"
ai_gateway_talkmaster_dir: /opt/iiab/talkmaster
ai_gateway_talkmaster_version: main
ai_gateway_jwlinker_repo: "https://github.com/deldesir/jwlinker.git"
ai_gateway_jwlinker_dir: /opt/iiab/jwlinker
ai_gateway_jwlinker_version: master

# Service
ai_gateway_port: 8086
ai_gateway_user: "{{ iiab_admin_user }}"

# App entrypoint (uvicorn factory)
ai_gateway_app: "app.api.app:create_app"

# LLM Integration — native Gemini provider (LiteLLM proxy is retired).
#
# Default path: the gateway runs Hermes with provider "gemini"
# (GeminiNativeClient → Google AI Studio), which needs only a Gemini API key.
# Set GEMINI_API_KEY once in local_vars (see ai_gateway_gemini_api_key below)
# and the engine auto-selects the native provider — no proxy on :4000.
#
# Custom-endpoint / legacy path: leave ai_gateway_gemini_api_key empty and set
# ai_gateway_hermes_provider="" — the engine then falls back to the
# OpenAI-compatible client at ai_gateway_openai_api_base.
ai_gateway_hermes_provider: "{{ 'gemini' if (ai_gateway_gemini_api_key | default('')) else '' }}"
# Pulls the existing key from local_vars' litellm_env block so the secret is
# defined in exactly one place. Override directly if you keep it elsewhere.
ai_gateway_gemini_api_key: "{{ (litellm_env.GEMINI_API_KEY | default('')) if (litellm_env is defined) else '' }}"
ai_gateway_openai_api_base: "http://localhost:4000"
ai_gateway_openai_api_key: "{{ litellm_master_key | default('change-me') }}"
ai_gateway_llm_model: "gemini-3.5-flash"
ai_gateway_llm_model_summarize: "gemini-3.5-flash"
ai_gateway_llm_temperature: "0.3"

# Embeddings (#5 — nomic-embed-text-v1.5 is 2x better than MiniLM at same size)
ai_gateway_embedding_provider: "local"
ai_gateway_embedding_model: "nomic-ai/nomic-embed-text-v1.5"
# MemPalace embedding model: 'minilm' (light, English-only) or 'embeddinggemma'
# (multilingual, ~300 MB — memory-heavy; test footprint before using on 4 GB).
ai_gateway_mempalace_embedding_model: "minilm"

# RapidPro Integration
ai_gateway_rapidpro_host: "http://localhost:8080"
ai_gateway_rapidpro_token: "{{ rapidpro_auth_token | default('change-me') }}"

# SiYuan Integration (used by talkmaster/jwlinker for notebook sync)
ai_gateway_siyuan_url: "http://localhost:6806"
ai_gateway_siyuan_token: "{{ siyuan_api_token | default('') }}"

# Optional admin contact (e.g. for debug webhooks)
ai_gateway_admin_phone: ""
ai_gateway_api_key: ""
ai_gateway_authorized_users: ""

# RiveBot intent-matching service
ai_gateway_rivebot_url: "http://localhost:8087"

# Public URLs (for download links / SiYuan links sent to users via WhatsApp)
ai_gateway_public_url: "http://localhost:8086"
ai_gateway_siyuan_public_url: "{{ ai_gateway_siyuan_url }}"
ai_gateway_siyuan_notebook_id: ""

# jwlinker DB path — empty uses platform default (~/.local/share/jwlinker/jw_library.db)
ai_gateway_jwlinker_db_path: ""

# PostgreSQL URI for persona/channel/admin data (shares RapidPro's temba DB)
# The konex_* tables are auto-created on first boot via init_db().
# Set to "" to fall back to local SQLite (dev only).
ai_gateway_postgres_uri: "postgresql+asyncpg://{{ rapidpro_db_user | default('temba') }}:{{ rapidpro_db_pass | default('temba') }}@localhost:5432/{{ rapidpro_db_name | default('temba') }}"

# Fallback persona when no channel→persona mapping exists
ai_gateway_default_persona: "konex-support"

# ── V2 Architecture: Hermes Agent + MemPalace ───────────────────────
# Hermes autonomous agent (vendored at /opt/iiab/hermes-agent)
ai_gateway_hermes_version: "v0.9.0"
ai_gateway_hermes_max_iterations: 15
ai_gateway_hermes_thread_pool_size: 2         # Default 2; increase to 3 on 4GB+ devices
ai_gateway_hermes_home: "{{ ai_gateway_dir }}/data/hermes"

# MemPalace structured memory (ChromaDB backend)
ai_gateway_mempalace_palace_path: "{{ ai_gateway_dir }}/data/palace"
ai_gateway_mempalace_backend: "chromadb"

# SiYuan Knowledge Wiki integration (enable in Phase 4)
ai_gateway_siyuan_wiki_enabled: false
ai_gateway_siyuan_api_url: "http://localhost:6806"
