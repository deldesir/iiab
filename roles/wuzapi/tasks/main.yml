---
- name: Install build dependencies
  apt:
    name:
      - git
      - make
      - ffmpeg
      - sqlite3
      - libsqlite3-dev
    state: present
  become: yes

- name: Create Wuzapi directory
  file:
    path: "{{ wuzapi_dir }}"
    state: directory

- name: Install Wuzapi Binary from Release
  get_url:
    url: "https://github.com/deldesir/wuzapi/releases/download/v1.0.7/wuzapi-linux-{{ wuzapi_go_arch }}"
    dest: "{{ wuzapi_dir }}/wuzapi"
    mode: '0755'
    force: yes
  become: yes
  notify: restart wuzapi

- name: Clone Wuzapi repository (for static assets)
  git:
    repo: "https://github.com/deldesir/wuzapi.git"
    dest: "/opt/iiab/wuzapi-src"
    version: "main"
    update: yes
  become: yes

- name: Copy static assets to install directory
  copy:
    src: "/opt/iiab/wuzapi-src/static"
    dest: "{{ wuzapi_dir }}/"
    remote_src: yes
    owner: "{{ iiab_admin_user }}"
    group: "{{ iiab_admin_user }}"
  become: yes
  notify: restart wuzapi

- name: Ensure correct ownership for Wuzapi directory
  file:
    path: "{{ wuzapi_dir }}"
    owner: "{{ iiab_admin_user }}"
    group: "{{ iiab_admin_user }}"
    recurse: yes
    state: directory
  become: yes
  notify: restart wuzapi

- name: Install Wuzapi systemd service
  template:
    src: wuzapi.service.j2
    dest: /etc/systemd/system/wuzapi.service
  become: yes
  notify: restart wuzapi

- name: Enable and start Wuzapi service (systemd)
  systemd:
    name: wuzapi
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes
  when: not is_proot

- name: Enable & start Wuzapi service via pdsm (Android/Proot)
  when: is_proot
  block:
    - name: pdsm - Enable wuzapi
      command: /usr/local/bin/pdsm enable wuzapi

    - name: pdsm - Start wuzapi
      command: /usr/local/bin/pdsm start wuzapi
      register: pdsm_wuzapi_start
      changed_when: "'already running' not in pdsm_wuzapi_start.stdout"

- name: Configure Nginx for Wuzapi
  template:
    src: wuzapi-nginx.conf.j2
    dest: /etc/nginx/conf.d/wuzapi.conf
  become: yes
  notify: reload nginx

- name: Mark wuzapi as installed
  lineinfile:
    path: /etc/iiab/iiab_state.yml
    line: "wuzapi_installed: True"
    create: yes
  become: yes

- name: Symlink Wuzapi binary to path (Android)
  file:
    src: "{{ wuzapi_dir }}/wuzapi"
    dest: /usr/local/bin/wuzapi
    state: link
  become: yes
  when: is_proot


