---
# Install tasks for ERPNext

- name: "Set 'mysql_install: True' and 'mysql_enabled: True'"
  set_fact:
    mysql_install: True
    mysql_enabled: True

- name: MYSQL - run 'mysql' role (attempt to install & enable MySQL / MariaDB)
  include_role:
    name: mysql

- name: FAIL (STOP THE INSTALL) IF 'mysql_installed is undefined'
  fail:
    msg: "ERPNext install cannot proceed, as MySQL / MariaDB is not installed."
  when: mysql_installed is undefined

- name: "Set 'nodejs_install: True' and 'nodejs_enabled: True'"
  set_fact:
    nodejs_install: True
    nodejs_enabled: True

- name: NODEJS - run 'nodejs' role (attempt to install & enable Node.js)
  include_role:
    name: nodejs

- name: FAIL (STOP THE INSTALL) IF 'nodejs_installed is undefined'
  fail:
    msg: "ERPNext install cannot proceed, as Node.js is not installed."
  when: nodejs_installed is undefined

- name: Record (initial) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df1

- name: Install ERPNext system dependencies
  apt:
    name:
      - redis-server
      - python3-pip
      - python3-venv
      - wkhtmltopdf
      - libmysqlclient-dev
      - python3-dev
      - pipx
      - curl
      - git
    state: present
  when: erpnext_enabled | bool

- name: Ensure git-hooks directory exists in /etc
  file:
    path: /etc/git-hooks
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: erpnext_enabled | bool

- name: Deploy system-wide secure git hooks (PAT leak prevention)
  copy:
    src: "git-hooks/{{ item }}"
    dest: "/etc/git-hooks/{{ item }}"
    owner: root
    group: root
    mode: '0755'
  loop:
    - pre-commit
    - post-commit
    - pre-push
    - README.md
  when: erpnext_enabled | bool

- name: Configure system-wide core.hooksPath
  command: git config --system core.hooksPath /etc/git-hooks
  when: erpnext_enabled | bool


- name: Install yarn globally via npm
  npm:
    name: yarn
    global: yes
    state: present
  when: erpnext_enabled | bool

- name: Ensure vm.overcommit_memory=1 persists across reboots (Redis requirement)
  copy:
    dest: /etc/sysctl.d/99-iiab-erpnext-redis.conf
    content: "vm.overcommit_memory=1\n"
    mode: '0644'
  become: yes
  when: erpnext_enabled | bool

- name: Apply vm.overcommit_memory=1 immediately (no module, no deprecation)
  command: sysctl -w vm.overcommit_memory=1
  become: yes
  changed_when: false
  when: erpnext_enabled | bool

- name: Configure MariaDB for ERPNext
  template:
    src: erpnext-mysqld.cnf.j2
    dest: /etc/mysql/mariadb.conf.d/99-erpnext.cnf
  notify: restart mariadb
  when: erpnext_enabled | bool

- name: Create frappe user
  user:
    name: "{{ erpnext_user_name }}"
    shell: /bin/bash
    home: /home/{{ erpnext_user_name }}
    groups: www-data
    append: yes
  when: erpnext_enabled | bool

- name: Ensure pipx is installed and in path for frappe user
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: pipx ensurepath
  args:
    creates: /home/{{ erpnext_user_name }}/.local/bin
  when: erpnext_enabled | bool

- name: Install frappe-bench globally for frappe user
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: pipx install frappe-bench
  args:
    creates: /home/{{ erpnext_user_name }}/.local/bin/bench
  when: erpnext_enabled | bool

- name: Install uv via pipx for frappe user (required by modern bench init)
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: pipx install uv
  args:
    creates: /home/{{ erpnext_user_name }}/.local/bin/uv
  when: erpnext_enabled | bool

# frappe-bench unconditionally calls `sudo supervisorctl status` during
# bench init / get-app.  Without supervisor + passwordless sudo, the
# entire ERPNext installation crashes.
- name: Install supervisor (required by frappe-bench tool)
  apt:
    name: supervisor
    state: present
  when: erpnext_enabled | bool

- name: Ensure supervisor is running
  systemd:
    name: supervisor
    state: started
    enabled: yes
  when: erpnext_enabled | bool

- name: Grant frappe user passwordless sudo for bench tooling
  copy:
    dest: /etc/sudoers.d/frappe
    content: |
      {{ erpnext_user_name }} ALL=(ALL) NOPASSWD: /usr/bin/supervisorctl
      {{ erpnext_user_name }} ALL=(ALL) NOPASSWD: /usr/sbin/nginx
      {{ erpnext_user_name }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl
    mode: '0440'
    validate: 'visudo -cf %s'
  when: erpnext_enabled | bool

- name: Instruct uv to fetch specific Python version if needed
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: ~/.local/bin/uv python install 3.14
  args:
    creates: /home/{{ erpnext_user_name }}/.local/share/uv/python
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when:
    - erpnext_enabled | bool
    - erpnext_version == 'version-16'

- name: Init frappe bench
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: ~/.local/bin/bench init frappe-bench --frappe-path https://github.com/deldesir/frappe.git --frappe-branch {{ erpnext_version }} {% if erpnext_version == 'version-16' %}--python 3.14{% endif %}
  args:
    chdir: /home/{{ erpnext_user_name }}
    creates: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

- name: Install ERPNext app in bench
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: ~/.local/bin/bench get-app https://github.com/deldesir/erpnext.git --branch {{ erpnext_version }}
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
    creates: /home/{{ erpnext_user_name }}/frappe-bench/apps/erpnext
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

- name: Install extra Frappe apps in bench (HR, CRM, etc.)
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: ~/.local/bin/bench get-app {{ item.name }} --branch {{ item.branch }}
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
    creates: /home/{{ erpnext_user_name }}/frappe-bench/apps/{{ item.app_name }}
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ erpnext_extra_apps }}"
  when: erpnext_enabled | bool

# NOTE: Services are stopped by the pre-build block below (line ~459), which runs
# on every install/reinstall.  No separate stop needed here.

# DB drop is destructive — only triggered by explicit erpnext_force_drop_db flag,
# NOT by a standard reinstall.  A normal reinstall preserves all data and just
# refreshes code + rebuilds + migrates.
- name: Drop ERPNext DB (ONLY when erpnext_force_drop_db is set)
  mysql_db:
    name: "{{ erpnext_db_name }}"
    state: absent
    login_unix_socket: /run/mysqld/mysqld.sock
  when: erpnext_enabled | bool and erpnext_force_drop_db | default(False) | bool

- name: Drop ERPNext Site Directory (ONLY when erpnext_force_drop_db is set)
  file:
    path: /home/{{ erpnext_user_name }}/frappe-bench/sites/{{ erpnext_site_name }}
    state: absent
  when: erpnext_enabled | bool and erpnext_force_drop_db | default(False) | bool

- name: Flush Redis cache + queue (eliminates stale assets_json, doctype_meta, boot data)
  command: redis-cli -p {{ item }} FLUSHDB
  loop:
    - 13000
    - 11000
  when: erpnext_enabled | bool

- name: Ensure correct ownership of Frappe apps directory (prevents permission errors on code pull)
  command: chown -R {{ erpnext_user_name }}:{{ erpnext_user_name }} /home/{{ erpnext_user_name }}/frappe-bench/apps
  when: erpnext_enabled | bool


- name: Pull latest code from fork for frappe/erpnext
  become: yes
  become_user: "{{ erpnext_user_name }}"
  shell: |
    if git remote | grep -q "^origin$"; then
        REMOTE="origin"
    else
        REMOTE=$(git config branch.$(git rev-parse --abbrev-ref HEAD).remote || echo "")
        if [ -z "$REMOTE" ] || ! git remote | grep -q "^$REMOTE$"; then
            REMOTE=$(git remote | head -n 1)
        fi
    fi
    BRANCH=$(git rev-parse --abbrev-ref HEAD)
    if [ -n "$REMOTE" ] && [ -n "$BRANCH" ]; then
        [ -f .git/shallow ] && git fetch --unshallow $REMOTE $BRANCH 2>/dev/null || git fetch $REMOTE $BRANCH
        git reset --hard $REMOTE/$BRANCH
    fi
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench/apps/{{ item }}
  loop:
    - frappe
    - erpnext
  when: erpnext_enabled | bool
  ignore_errors: yes

- name: Pull latest code from fork for extra apps
  become: yes
  become_user: "{{ erpnext_user_name }}"
  shell: |
    if git remote | grep -q "^origin$"; then
        REMOTE="origin"
    else
        REMOTE=$(git config branch.$(git rev-parse --abbrev-ref HEAD).remote || echo "")
        if [ -z "$REMOTE" ] || ! git remote | grep -q "^$REMOTE$"; then
            REMOTE=$(git remote | head -n 1)
        fi
    fi
    BRANCH=$(git rev-parse --abbrev-ref HEAD)
    if [ -n "$REMOTE" ] && [ -n "$BRANCH" ]; then
        [ -f .git/shallow ] && git fetch --unshallow $REMOTE $BRANCH 2>/dev/null || git fetch $REMOTE $BRANCH
        git reset --hard $REMOTE/$BRANCH
    fi
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench/apps/{{ item.app_name }}
  loop: "{{ erpnext_extra_apps }}"
  when: erpnext_enabled | bool
  ignore_errors: yes


- name: Update Python/Node dependencies after code pull (prevents ImportError on new packages)
  become: yes
  become_user: "{{ erpnext_user_name }}"
  shell: ~/.local/bin/bench setup requirements
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    CYPRESS_INSTALL_BINARY: "0"
  when: erpnext_enabled | bool
  ignore_errors: yes

- name: Wipe compiled JS/CSS bundles (forces clean bench build, avoids stale hashes)
  shell: |
    rm -rf /home/{{ erpnext_user_name }}/frappe-bench/sites/assets/*/dist
    rm -f  /home/{{ erpnext_user_name }}/frappe-bench/sites/assets/assets.json
    rm -f  /home/{{ erpnext_user_name }}/frappe-bench/sites/assets/assets-rtl.json
  when: erpnext_enabled | bool

- name: Create ERPNext database
  mysql_db:
    name: "{{ erpnext_db_name }}"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  when: erpnext_enabled | bool

- name: Create ERPNext database user
  mysql_user:
    name: "{{ erpnext_db_user }}"
    password: "{{ erpnext_db_password }}"
    priv: "{{ erpnext_db_name }}.*:ALL"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  when: erpnext_enabled | bool

- name: Create ERPNext Site
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: ~/.local/bin/bench new-site {{ erpnext_site_name }} --admin-password {{ erpnext_admin_password }} --db-name {{ erpnext_db_name }} --db-password {{ erpnext_db_password }} --no-setup-db --force
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
    creates: /home/{{ erpnext_user_name }}/frappe-bench/sites/{{ erpnext_site_name }}/site_config.json
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

- name: Ensure site_config.json has the correct database password (prevents Access Denied if password changed in local_vars.yml)
  become: yes
  become_user: "{{ erpnext_user_name }}"
  shell: |
    python3 -c "
    import json
    path = '/home/{{ erpnext_user_name }}/frappe-bench/sites/{{ erpnext_site_name }}/site_config.json'
    try:
        with open(path, 'r') as f:
            data = json.load(f)
        if data.get('db_password') != '{{ erpnext_db_password }}':
            data['db_password'] = '{{ erpnext_db_password }}'
            with open(path, 'w') as f:
                json.dump(data, f, indent=1)
            print('UPDATED PASSWORD')
    except Exception as e:
        print(f'ERROR: {e}')
    "
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  when: erpnext_enabled | bool

- name: Ensure currentsite.txt exists (Frappe needs this to resolve the active site)
  copy:
    content: "{{ erpnext_site_name }}\n"
    dest: /home/{{ erpnext_user_name }}/frappe-bench/sites/currentsite.txt
    owner: "{{ erpnext_user_name }}"
    group: "{{ erpnext_user_name }}"
    mode: '0644'
    force: no
  when: erpnext_enabled | bool

- name: Set site host_name for IIAB subpath
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: ~/.local/bin/bench --site {{ erpnext_site_name }} set-config host_name "{{ erpnext_host_name }}"
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

- name: Generate Systemd Services (replaces Supervisor)
  become: yes
  become_user: "{{ erpnext_user_name }}"
  shell: |
    yes | ~/.local/bin/bench setup systemd
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

- name: Increase gunicorn worker timeout to 300s (setup_wizard.setup_complete needs >120s)
  replace:
    path: /home/{{ erpnext_user_name }}/frappe-bench/config/systemd/frappe-bench-frappe-web.service
    regexp: '-t 120'
    replace: '-t 300'
  when: erpnext_enabled | bool

- name: Set gunicorn workers to (2 * CPU cores) + 1 for optimal concurrency
  replace:
    path: /home/{{ erpnext_user_name }}/frappe-bench/config/systemd/frappe-bench-frappe-web.service
    regexp: '-w \d+'
    replace: '-w {{ (2 * (ansible_processor_vcpus | default(2) | int)) + 1 }}'
  when: erpnext_enabled | bool

- name: Fix bench setup systemd bug (ExecStart=None in worker/scheduler services)
  replace:
    path: "/home/{{ erpnext_user_name }}/frappe-bench/config/systemd/{{ item }}"
    regexp: 'ExecStart=None '
    replace: 'ExecStart=/home/{{ erpnext_user_name }}/.local/bin/bench '
  loop:
    - frappe-bench-frappe-schedule.service
    - frappe-bench-frappe-default-worker@.service
    - frappe-bench-frappe-short-worker@.service
    - frappe-bench-frappe-long-worker@.service
  when: erpnext_enabled | bool

- name: Setup Systemd Symlinks
  shell: |
    ln -sf /home/{{ erpnext_user_name }}/frappe-bench/config/systemd/* /etc/systemd/system/
    systemctl daemon-reload
  when: erpnext_enabled | bool


- name: Start Bench Redis Services (required for install-app and migrate)
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - frappe-bench-redis-cache.service
    - frappe-bench-redis-queue.service
  when: erpnext_enabled | bool


- name: Install ERPNext App in Site
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: >-
    ~/.local/bin/bench --site {{ erpnext_site_name }} install-app erpnext
    {{ '--force' if (erpnext_force_drop_db | default(False) | bool) else '' }}
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

- name: Install extra apps in site (HR, CRM, etc.)
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: >-
    ~/.local/bin/bench --site {{ erpnext_site_name }} install-app {{ item.app_name }}
    {{ '--force' if (erpnext_force_drop_db | default(False) | bool) else '' }}
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  loop: "{{ erpnext_extra_apps }}"
  when: erpnext_enabled | bool

- name: Run migrate + clear-cache after all apps installed
  become: yes
  become_user: "{{ erpnext_user_name }}"
  shell: |
    ~/.local/bin/bench --site {{ erpnext_site_name }} migrate
    ~/.local/bin/bench --site {{ erpnext_site_name }} clear-cache
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

# NOTE: Do NOT set home_page to 'shop' at install time.
# On a fresh site the setup wizard hasn't run yet, so the shop page will
# crash with a 500 (no Company, no Item Groups). Frappe's built-in logic
# auto-redirects to the setup wizard when the default home page is used.
# Set home_page to 'shop' only AFTER the setup wizard has been completed,
# either manually or via a post-setup hook.



- name: Enable scheduler for the site
  become: yes
  become_user: "{{ erpnext_user_name }}"
  command: ~/.local/bin/bench --site {{ erpnext_site_name }} scheduler enable
  args:
    chdir: /home/{{ erpnext_user_name }}/frappe-bench
  environment:
    PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  when: erpnext_enabled | bool

- name: Enable ERPNext Systemd Targets (web + workers)
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - frappe-bench.target
    - frappe-bench-workers.target
  when: erpnext_enabled | bool

- name: Grant Nginx access to Frappe static assets
  shell: chmod a+x /home/{{ erpnext_user_name }} /home/{{ erpnext_user_name }}/frappe-bench && chmod -R a+rX /home/{{ erpnext_user_name }}/frappe-bench/sites
  when: erpnext_enabled | bool

- name: Configure IIAB Nginx Sub-Path Proxy for ERPNext
  template:
    src: erpnext-nginx.conf.j2
    dest: /etc/nginx/conf.d/erpnext-nginx.conf
  notify:
    - restart nginx
  when: erpnext_enabled | bool

# ── NOTE: IIAB subpath patches are now baked into deldesir/* forks ──────────────
# frappe JS patches  → deldesir/frappe   (version-16 branch)
# ERPNext POS patches → deldesir/erpnext (version-16 branch)
# HRMS roster patch   → deldesir/hrms    (version-16 branch)
# CRM demo + router   → deldesir/crm     (main branch)
# Builder patches     → deldesir/builder (develop branch)
# Historical patch files are archived in files/archive/

# ── Determine whether a full build is needed ──────────────────────────────────
# On a repeat runrole (no --reinstall), skip the expensive build+restart cycle
# if assets are already built.  This avoids 15-45 min of downtime + session
# destruction for a "just enforce enabled" re-run.
- name: Check if JS assets are already built
  stat:
    path: /home/{{ erpnext_user_name }}/frappe-bench/sites/assets/assets.json
  register: _assets_json
  when: erpnext_enabled | bool

- name: Set _needs_build flag
  set_fact:
    _needs_build: "{{ reinstall | default(False) | bool or erpnext_force_rebuild | default(False) | bool or not (_assets_json.stat.exists | default(false)) or erpnext_installed is undefined }}"


# ── Stop ALL services before build ─────────────────────────────────────────────
# 1) Frees ~900 MB of RAM held by gunicorn workers + background jobs, which is
#    critical for CRM's heavy Vite/Rollup build on low-RAM deployments.
# 2) gunicorn --preload forks workers from a master that loads all Python modules
#    at startup.  Workers that preloaded before patches/installs will serve stale
#    code and crash on missing modules (e.g. hrms, crm).  Killing every process
#    guarantees a clean slate when we restart after the build.
# NOTE: We stop individual services explicitly because systemd targets with
# Wants= do NOT propagate stop/start to already-running member services.
- name: Stop Frappe services before build (kill stale gunicorn workers + free RAM)
  shell: |
    systemctl stop frappe-bench-frappe-web.service \
                   frappe-bench-node-socketio.service \
                   frappe-bench-frappe-schedule.service \
                   'frappe-bench-frappe-default-worker@*.service' \
                   'frappe-bench-frappe-short-worker@*.service' \
                   'frappe-bench-frappe-long-worker@*.service' \
                   frappe-bench.target 2>/dev/null || true
  when: erpnext_enabled | bool and _needs_build | bool

- name: Flush Redis caches before build (clear stale boot data and asset references)
  command: redis-cli -p {{ item }} FLUSHDB
  loop:
    - 13000
    - 11000
  when: erpnext_enabled | bool and _needs_build | bool

# ── Build JS bundles with temporary swap ───────────────────────────────────────
# CRM's Vite/Rollup build needs 4-6 GB during its "rendering chunks" phase.
# On systems where other services consume 5+ GB, the build is OOM-killed (exit
# 137) even with Frappe services stopped.  A temporary 4 GB swapfile on /var/tmp
# (never tmpfs, guaranteed on-disk) provides overflow headroom.
# The block/always structure guarantees the swapfile is cleaned up even if the
# build fails.
- block:
    - name: Create temporary 4 GB swapfile for Vite build
      shell: |
        SWAPFILE=/var/tmp/.erpnext_build_swap
        if [ ! -f "$SWAPFILE" ]; then
          fallocate -l 4G "$SWAPFILE" 2>/dev/null || \
            dd if=/dev/zero of="$SWAPFILE" bs=1M count=4096 status=none
          chmod 600 "$SWAPFILE"
          mkswap "$SWAPFILE" >/dev/null
          swapon "$SWAPFILE"
        fi

    # All IIAB customizations are baked into deldesir/* forks.  A single 'bench
    # build' (without --app flags) generates a unified assets.json covering
    # every installed app.  Using --app causes each app to overwrite assets.json
    # with only its own entries, breaking CSS/JS references for all other apps.
    # NOTE: NODE_OPTIONS is NOT set here.  Frappe's build.py auto-calculates
    # the V8 heap limit to 75 % of total RAM via get_safe_max_old_space_size()
    # and passes it via popen(env=get_node_env()), which replaces the entire
    # inherited environment.
    - name: Rebuild all JS bundles (unified assets.json)
      shell: |
        /home/{{ erpnext_user_name }}/.local/bin/bench build
      args:
        chdir: "/home/{{ erpnext_user_name }}/frappe-bench"
      become: yes
      become_user: "{{ erpnext_user_name }}"
      environment:
        PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

    - name: Rebuild Builder Frontend (Vite — separate from bench build)
      shell: |
        yarn install
        yarn build
      args:
        chdir: "/home/{{ erpnext_user_name }}/frappe-bench/apps/builder/frontend"
      become: yes
      become_user: "{{ erpnext_user_name }}"
      when: erpnext_enabled | bool
      ignore_errors: yes

    - name: Deploy IIAB asset patching script
      template:
        src: patch_erpnext_assets.py.j2
        dest: /home/{{ erpnext_user_name }}/frappe-bench/patch_erpnext_assets.py
        owner: "{{ erpnext_user_name }}"
        group: "{{ erpnext_user_name }}"
        mode: '0755'
      when: erpnext_enabled | bool

    - name: Run IIAB asset patching script (idempotent subpath fix for compiled artifacts)
      command: python3 /home/{{ erpnext_user_name }}/frappe-bench/patch_erpnext_assets.py
      args:
        chdir: /home/{{ erpnext_user_name }}/frappe-bench
      become: yes
      become_user: "{{ erpnext_user_name }}"
      when: erpnext_enabled | bool

    - name: Deploy IIAB About page translation and custom styling script
      template:
        src: update_about_page.py.j2
        dest: /home/{{ erpnext_user_name }}/frappe-bench/update_about_page.py
        owner: "{{ erpnext_user_name }}"
        group: "{{ erpnext_user_name }}"
        mode: '0755'
      when: erpnext_enabled | bool

    - name: Run IIAB About page translation and custom styling script
      become: yes
      become_user: "{{ erpnext_user_name }}"
      shell: |
        ~/.local/bin/bench --site {{ erpnext_site_name }} execute "exec('import sys; sys.path.insert(0, \"/home/{{ erpnext_user_name }}/frappe-bench\"); import update_about_page; update_about_page.run()')"
      args:
        chdir: /home/{{ erpnext_user_name }}/frappe-bench
      environment:
        PATH: "/home/{{ erpnext_user_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      when: erpnext_enabled | bool

  always:
    - name: Remove temporary swapfile after build
      shell: |
        SWAPFILE=/var/tmp/.erpnext_build_swap
        if [ -f "$SWAPFILE" ]; then
          swapoff "$SWAPFILE" 2>/dev/null || true
          rm -f "$SWAPFILE"
        fi
  when: erpnext_enabled | bool and _needs_build | bool

# ── Start services with clean workers ──────────────────────────────────────────
# Restart (not just start) every service explicitly to guarantee gunicorn
# preloads the freshly-built code.  A simple 'start frappe-bench.target'
# would skip services that systemd considers "already active" from before
# the stop, leaving stale workers that crash on missing modules (hrms, crm).
- name: Start Frappe services with fresh workers (all apps loaded cleanly)
  shell: |
    systemctl restart frappe-bench.target \
                      frappe-bench-frappe-web.service \
                      frappe-bench-node-socketio.service \
                      frappe-bench-frappe-schedule.service
    systemctl restart 'frappe-bench-frappe-default-worker@*.service' \
                      'frappe-bench-frappe-short-worker@*.service' \
                      'frappe-bench-frappe-long-worker@*.service' 2>/dev/null || true
  when: erpnext_enabled | bool and _needs_build | bool

- name: Ensure Frappe services are running (no-build re-run)
  systemd:
    name: "{{ item }}"
    state: started
  loop:
    - frappe-bench.target
    - frappe-bench-frappe-web.service
    - frappe-bench-node-socketio.service
    - frappe-bench-frappe-schedule.service
  when: erpnext_enabled | bool and not (_needs_build | bool)

- name: Record (final) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df2

- name: Add 'erpnext_disk_usage' delta to iiab.ini
  ini_file:
    path: /etc/iiab/iiab.ini
    section: erpnext
    option: erpnext_disk_usage
    value: "{{ df2.stdout | int - df1.stdout | int }}"

- name: "Set 'erpnext_installed: True'"
  set_fact:
    erpnext_installed: True

- name: "Add 'erpnext_installed: True' to /etc/iiab/iiab_state.yml"
  lineinfile:
    path: /etc/iiab/iiab_state.yml
    regexp: '^erpnext_installed'
    line: 'erpnext_installed: True'
