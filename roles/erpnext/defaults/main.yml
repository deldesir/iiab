---
# defaults file for erpnext

erpnext_install: False
erpnext_enabled: False
erpnext_db_root_password: "" # Should ideally be {{ mysql_root_password }}
erpnext_admin_password: "CHANGEME"  # Override in /etc/iiab/local_vars.yml
erpnext_version: "version-16"
erpnext_site_name: "site.local"
erpnext_user_name: "frappe"
erpnext_db_name: "_site_local"
erpnext_db_user: "_site_local"
erpnext_db_password: "CHANGEME" # User should ideally override this
# Public URL for email/PDF links (e.g. "https://example.com/erp").
# Auto-derived from iiab_ssl_domain when SSL is enabled.
# Override explicitly in local_vars.yml if needed.
erpnext_host_name: "{% if iiab_ssl_enabled | default(False) %}https://{{ iiab_ssl_domain }}/erp{% else %}http://box.lan/erp{% endif %}"

# Extra Frappe apps to install alongside ERPNext (HR, CRM, etc.)
# Each entry needs: name (pip/git name), branch, and app_name (bench install-app name).
erpnext_extra_apps:
  - { name: "https://github.com/deldesir/hrms.git",    branch: "version-16", app_name: "hrms" }
  - { name: "https://github.com/deldesir/crm.git",     branch: "version-16", app_name: "crm" }
  - { name: "https://github.com/deldesir/builder.git",  branch: "version-16", app_name: "builder" }
  - { name: "payments",   branch: "version-16", app_name: "payments" }
  - { name: "https://github.com/deldesir/webshop.git",  branch: "version-16", app_name: "webshop" }
  - { name: "https://github.com/deldesir/POSNext.git",  branch: "version-16", app_name: "pos_next" }

# IIAB Storefront and Builder CLI repositories
builder_cli_repo: "https://github.com/deldesir/builder-cli.git"
builder_cli_dir: "/opt/iiab/builder-cli"
builder_cli_branch: "main"

storefront_repo: "https://github.com/deldesir/novadah-storefront.git"
storefront_dir: "/opt/iiab/novadah-storefront"
storefront_branch: "main"

# Standardized Git user identity variables (customizable via local_vars.yml)
erpnext_git_name: "Blondel Mondesir"
erpnext_git_email: "blondel.md@gmail.com"


