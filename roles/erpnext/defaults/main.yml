---
# defaults file for erpnext

erpnext_install: False
erpnext_enabled: False
erpnext_db_root_password: "" # Should ideally be {{ mysql_root_password }}
erpnext_admin_password: "admin"
erpnext_version: "version-16"
erpnext_site_name: "site.local"
erpnext_user_name: "frappe"
erpnext_db_name: "_site_local"
erpnext_db_user: "_site_local"
erpnext_db_password: "CHANGEME" # User should ideally override this
# Public URL for email/PDF links (e.g. "https://example.com/erp").
# Auto-derived from iiab_ssl_domain when SSL is enabled.
# Override explicitly in local_vars.yml if needed.
erpnext_host_name: "{% if iiab_ssl_enabled | default(False) %}https://{{ iiab_ssl_domain }}/erp{% else %}http://box.lan/erp{% endif %}"

# Extra Frappe apps to install alongside ERPNext (HR, CRM, etc.)
# Each entry needs: name (pip/git name), branch, and app_name (bench install-app name).
erpnext_extra_apps:
  - { name: "hrms",       branch: "version-16", app_name: "hrms" }
  - { name: "crm",        branch: "main",       app_name: "crm" }
  - { name: "builder",    branch: "develop",    app_name: "builder" }
  - { name: "payments",   branch: "version-16", app_name: "payments" }
  - { name: "webshop",    branch: "builder-port", app_name: "webshop" }
  - { name: "https://github.com/BrainWise-DEV/POSNext.git", branch: "version-16", app_name: "pos_next" }
