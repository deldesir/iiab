# Managed by Ansible (hardening role).
# sshd uses FIRST-match semantics and reads sshd_config.d/ includes before
# the main config, in lexical order — 00- wins over any cloud-init drop-in
# (50-cloud-init.conf once silently re-enabled password auth here; all
# real logins have only ever been publickey).
PasswordAuthentication no
KbdInteractiveAuthentication no
