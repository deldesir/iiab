---
# IIAB local patches applied after every git pull.
# Same pattern as RapidPro's configure.yml — replace/blockinfile with ignore_errors.

# ═══════════════════════════════════════════════════════════════════
# Hermes Agent patches
# ═══════════════════════════════════════════════════════════════════

# Patch 1: Tenant-scoped memory isolation via contextvars
# Reason: Multi-tenant WhatsApp deployments need per-user memory dirs
- name: "hermes: tenant memory isolation"
  replace:
    path: /opt/iiab/hermes-agent/tools/memory_tool.py
    regexp: |
      def get_memory_dir\(\) -> Path:
          """Return the profile-scoped memories directory."""
          return get_hermes_home\(\) / "memories"
    replace: |
      import contextvars

      # IIAB: tenant isolation for multi-user WhatsApp deployments
      current_tenant_urn: contextvars.ContextVar[str] = contextvars.ContextVar("current_tenant_urn", default="")

      def get_memory_dir() -> Path:
          """Return the profile-scoped memories directory.
          If current_tenant_urn is set, isolates memories per-user."""
          base = get_hermes_home() / "memories"
          urn = current_tenant_urn.get()
          if urn:
              user_digits = urn.split(":")[-1].lstrip("+")
              return base / f"user_{user_digits}"
          return base
  become: yes
  register: patch_tenant
  ignore_errors: yes

- name: "⚠️  tenant isolation patch did not apply"
  debug:
    msg: "Hermes tenant isolation patch FAILED — upstream may have refactored memory_tool.py"
  when: patch_tenant is failed

# Patch 2: 4KB USER.md storage cap
# Reason: Prevent token exhaustion from unbounded user memory growth
- name: "hermes: 4KB USER.md storage cap"
  replace:
    path: /opt/iiab/hermes-agent/tools/memory_tool.py
    regexp: 'return self\.user_char_limit'
    replace: 'return 4096  # IIAB: storage cap for multi-tenant'
  become: yes
  register: patch_cap
  ignore_errors: yes

- name: "⚠️  storage cap patch did not apply"
  debug:
    msg: "Hermes 4KB storage cap patch FAILED — check tools/memory_tool.py"
  when: patch_cap is failed

# ═══════════════════════════════════════════════════════════════════
# MemPalace patches
# ═══════════════════════════════════════════════════════════════════
# (Removed 2026-06-26) The 500-drawer per-wing cap was dropped: it was a
# reject-on-full / no-eviction guard that, in practice, ran fail-open
# (col.count(where=...) raised, so the add proceeded anyway). If a real
# per-wing bound is wanted, implement it config-driven with compression/
# pruning rather than a hard reject — see the ecosystem notes.

# ═══════════════════════════════════════════════════════════════════
# RapidPro patches
# ═══════════════════════════════════════════════════════════════════

# Patch 4: Widen Python requirement to accept any 3.12+
# Reason: Upstream frequently bumps the minimum patch version (e.g. >=3.14.5).
# We keep uv updated and install the required version, but --frozen may fail
# if pyproject.toml has a narrow window our uv doesn't yet know about.
- name: "rapidpro: widen Python version constraint"
  replace:
    path: /opt/iiab/rapidpro/pyproject.toml
    regexp: 'requires-python = ">=3\.\d+(\.\d+)?,<3\.\d+"'
    replace: 'requires-python = ">=3.12"'
  become: yes
  ignore_errors: yes
