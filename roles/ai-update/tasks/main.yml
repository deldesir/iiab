---
# ai-update: Update the entire cognitive pipeline in one shot.
# No install-once guard. No boolean assertions. Just update.
#
# Usage:
#   ./runrole ai-update
#   ./runrole ai-update -e '{"ai_update_skip": ["wuzapi"]}'

- block:

    # ═══════════════════════════════════════════════════════════════
    # STAGE 0: Ensure git safe.directory for all repos
    # ═══════════════════════════════════════════════════════════════
    # Repos are owned by iiab-admin but Ansible runs as root.
    # The git module fails on dubious ownership before we can pull.

    - name: "Get existing git safe.directory entries"
      command: git config --global --get-all safe.directory
      register: _safe_dirs
      changed_when: false
      failed_when: false
      become: yes

    - name: "Add missing dirs to git safe.directory"
      command: git config --global --add safe.directory "{{ item }}"
      become: yes
      loop:
        - "{{ ai_update_gateway_dir }}"
        - /opt/iiab/hermes-agent
        - /opt/iiab/mempalace
        - /opt/iiab/talkmaster
        - /opt/iiab/jwlinker
        - "{{ ai_update_rivebot_dir }}"
        - "{{ ai_update_rapidpro_dir }}"
        - "{{ ai_update_wuzapi_src_dir }}"
      when: item not in (_safe_dirs.stdout_lines | default([]))

    # ═══════════════════════════════════════════════════════════════
    # STAGE 1: Pull all git repos
    # ═══════════════════════════════════════════════════════════════

    # 1a. Gateway cluster (shared venv)
    - name: "Pull gateway components"
      git:
        repo: "{{ item.repo }}"
        dest: "{{ item.dest }}"
        version: "{{ item.version }}"
        force: yes
        update: yes
      become: yes
      loop: "{{ ai_update_gateway_components }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name not in ai_update_skip
      register: gateway_git_results

    # 1b. RiveBot (own venv)
    - name: "Pull RiveBot"
      git:
        repo: "{{ ai_update_rivebot_repo }}"
        dest: "{{ ai_update_rivebot_dir }}"
        version: "{{ ai_update_rivebot_version }}"
        force: yes
        update: yes
      become: yes
      when: "'rivebot' not in ai_update_skip"
      register: rivebot_git_result

    # 1c. RapidPro
    - name: "Pull RapidPro"
      git:
        repo: "{{ ai_update_rapidpro_repo }}"
        dest: "{{ ai_update_rapidpro_dir }}"
        version: "{{ ai_update_rapidpro_version }}"
        force: yes
        update: yes
      become: yes
      when: "'rapidpro' not in ai_update_skip"
      register: rapidpro_git_result

    # 1d. WuzAPI source (static assets)
    - name: "Pull WuzAPI source (static assets)"
      git:
        repo: "{{ ai_update_wuzapi_src_repo }}"
        dest: "{{ ai_update_wuzapi_src_dir }}"
        version: main
        force: yes
        update: yes
      become: yes
      when: "'wuzapi' not in ai_update_skip"
      register: wuzapi_src_result

    # 1e. Courier (Go source for local build)
    - name: "Pull Courier source"
      git:
        repo: "{{ ai_update_courier_repo }}"
        dest: "{{ ai_update_courier_dir }}"
        version: "{{ ai_update_courier_version }}"
        force: yes
        update: yes
      become: yes
      when: "'courier' not in ai_update_skip"
      register: courier_git_result

    # 1f. Mailroom (Go source for local build)
    - name: "Pull Mailroom source"
      git:
        repo: "{{ ai_update_mailroom_repo }}"
        dest: "{{ ai_update_mailroom_dir }}"
        version: "{{ ai_update_mailroom_version }}"
        force: yes
        update: yes
      become: yes
      when: "'mailroom' not in ai_update_skip"
      register: mailroom_git_result

    # ═══════════════════════════════════════════════════════════════
    # STAGE 2: Go binaries — download release, build only if needed
    # ═══════════════════════════════════════════════════════════════
    # Strategy: try pre-built release binaries first (seconds).
    # Fall back to local Go compilation only when the download fails
    # (e.g. fork has commits newer than the latest GitHub release).

    # ── 2a. Courier (gzip-preferred download, raw fallback, source build last) ──
    # Prefer the gzipped release asset (much smaller download); fall back to the
    # raw binary if no .gz exists, then to a local source build if both fail.
    - name: "Install courier binary (prefer gzipped release asset)"
      shell: |
        set -e
        url="{{ ai_update_go_courier_url }}"; dest="{{ ai_update_go_courier_dest }}"
        if curl -fsSL "${url}.gz" -o /tmp/iiab-courier.gz; then
          gunzip -c /tmp/iiab-courier.gz > "$dest"; rm -f /tmp/iiab-courier.gz
        else
          curl -fsSL "$url" -o "$dest"
        fi
        chmod 0755 "$dest"
      args:
        executable: /bin/bash
      become: yes
      when:
        - "'courier' not in ai_update_skip"
        - courier_git_result.changed | default(false)
      register: courier_download_result
      failed_when: false
      changed_when: courier_download_result.rc == 0

    - name: "Build courier from source (fallback)"
      shell: >
        {{ ai_update_go_bin }} build -ldflags="-s -w"
        -o {{ ai_update_go_courier_dest }}
        ./cmd/courier
      args:
        chdir: "{{ ai_update_courier_dir }}"
      environment:
        CGO_ENABLED: "0"
        GOOS: linux
        GOARCH: "{{ ai_update_go_arch }}"
      become: yes
      when:
        - "'courier' not in ai_update_skip"
        - courier_git_result.changed | default(false)
        - courier_download_result.rc | default(1) != 0
      register: courier_build_result

    - name: "⚙️  courier: {{ 'downloaded release' if (courier_download_result.rc | default(1) == 0) else 'built from source' }}"
      debug:
        msg: "courier binary updated"
      when: courier_git_result.changed | default(false)
      changed_when: true

    # ── 2b. Mailroom (gzip-preferred download, raw fallback, source build last) ──
    - name: "Install mailroom binary (prefer gzipped release asset)"
      shell: |
        set -e
        url="{{ ai_update_go_mailroom_url }}"; dest="{{ ai_update_go_mailroom_dest }}"
        if curl -fsSL "${url}.gz" -o /tmp/iiab-mailroom.gz; then
          gunzip -c /tmp/iiab-mailroom.gz > "$dest"; rm -f /tmp/iiab-mailroom.gz
        else
          curl -fsSL "$url" -o "$dest"
        fi
        chmod 0755 "$dest"
      args:
        executable: /bin/bash
      become: yes
      when:
        - "'mailroom' not in ai_update_skip"
        - mailroom_git_result.changed | default(false)
      register: mailroom_download_result
      failed_when: false
      changed_when: mailroom_download_result.rc == 0

    - name: "Build mailroom from source (fallback)"
      shell: >
        {{ ai_update_go_bin }} build -ldflags="-s -w"
        -o {{ ai_update_go_mailroom_dest }}
        ./cmd/mailroom
      args:
        chdir: "{{ ai_update_mailroom_dir }}"
      environment:
        CGO_ENABLED: "0"
        GOOS: linux
        GOARCH: "{{ ai_update_go_arch }}"
      become: yes
      when:
        - "'mailroom' not in ai_update_skip"
        - mailroom_git_result.changed | default(false)
        - mailroom_download_result.rc | default(1) != 0
      register: mailroom_build_result

    - name: "⚙️  mailroom: {{ 'downloaded release' if (mailroom_download_result.rc | default(1) == 0) else 'built from source' }}"
      debug:
        msg: "mailroom binary updated"
      when: mailroom_git_result.changed | default(false)
      changed_when: true

    # ── 2c. WuzAPI (gzip-preferred download, raw fallback) ───────
    - name: "Install WuzAPI binary (prefer gzipped release asset)"
      shell: |
        set -e
        url="{{ ai_update_go_wuzapi_url }}"; dest=/opt/iiab/wuzapi/wuzapi
        if curl -fsSL "${url}.gz" -o /tmp/iiab-wuzapi.gz; then
          gunzip -c /tmp/iiab-wuzapi.gz > "$dest"; rm -f /tmp/iiab-wuzapi.gz
        else
          curl -fsSL "$url" -o "$dest"
        fi
        chmod 0755 "$dest"
      args:
        executable: /bin/bash
      become: yes
      when: "'wuzapi' not in ai_update_skip"
      register: wuzapi_binary_result
      changed_when: wuzapi_binary_result.rc == 0

    # ═══════════════════════════════════════════════════════════════
    # STAGE 3: Apply patches + resolve dependencies
    # ═══════════════════════════════════════════════════════════════

    # 3a. IIAB local patches (hermes, mempalace, rapidpro)
    - name: Apply IIAB local patches
      include_tasks: apply-patches.yml

    # 3b. Fix ownership on gateway components
    - name: Fix ownership on gateway component dirs
      file:
        path: "{{ item.dest }}"
        state: directory
        owner: "{{ ai_update_gateway_user }}"
        group: "{{ ai_update_gateway_user }}"
        recurse: yes
      become: yes
      loop: "{{ ai_update_gateway_components }}"
      loop_control:
        label: "{{ item.name }}"
      when: gateway_git_results.changed

    # 3c. ONE gateway uv sync (resolves all editable deps)
    - name: "Sync ai-gateway venv (all editable deps)"
      command: "{{ ai_update_uv_bin }} sync"
      args:
        chdir: "{{ ai_update_gateway_dir }}"
      become: yes
      environment:
        PATH: "/root/.local/bin:{{ ansible_env.PATH }}"
      when: gateway_git_results.changed

    # 3d. RiveBot uv sync (own venv)
    - name: "Sync RiveBot venv"
      command: "{{ ai_update_uv_bin }} sync"
      args:
        chdir: "{{ ai_update_rivebot_dir }}"
      become: yes
      environment:
        PATH: "/root/.local/bin:{{ ansible_env.PATH }}"
      when: rivebot_git_result.changed | default(false)

    # 3e. RapidPro post-update (configure + migrate + collectstatic + patches)
    - name: RapidPro post-update
      include_tasks: rapidpro-post-update.yml
      when: rapidpro_git_result.changed | default(false)

    # 3f. WuzAPI static assets
    - name: Copy updated WuzAPI static assets
      copy:
        src: "{{ ai_update_wuzapi_src_dir }}/static"
        dest: "{{ ai_update_wuzapi_dir }}/"
        remote_src: yes
        owner: "{{ ai_update_gateway_user }}"
        group: "{{ ai_update_gateway_user }}"
      become: yes
      when: wuzapi_src_result.changed | default(false)

    # ═══════════════════════════════════════════════════════════════
    # STAGE 3e: Clear stale bytecode caches
    # ═══════════════════════════════════════════════════════════════
    # Ported from hermes update's _clear_bytecode_cache — prevents
    # ImportError on gateway restart when updated source references
    # names that didn't exist in the old bytecode (.pyc files).

    - name: "Clear stale __pycache__ in gateway components"
      shell: find {{ item }} -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      become: yes
      changed_when: false
      loop:
        - "{{ ai_update_gateway_dir }}"
        - /opt/iiab/hermes-agent
        - /opt/iiab/mempalace
      when: gateway_git_results.changed

    # ═══════════════════════════════════════════════════════════════
    # STAGE 4: Verify imports
    # ═══════════════════════════════════════════════════════════════

    - name: Verify gateway imports
      command: >
        {{ ai_update_uv_bin }} run python -c
        "from run_agent import AIAgent; from mempalace.mcp_server import tool_status; print('Gateway imports OK')"
      args:
        chdir: "{{ ai_update_gateway_dir }}"
      become: yes
      register: gateway_verify
      failed_when: gateway_verify.rc != 0
      when: gateway_git_results.changed

    # ═══════════════════════════════════════════════════════════════
    # STAGE 5: Harden permissions (ALWAYS runs)
    # ═══════════════════════════════════════════════════════════════
    # These run unconditionally because ANY stage (git pull, chown,
    # uv sync, collectstatic) can tighten directory permissions that
    # nginx (www-data) or the hermes service user need.

    - name: "Fix RapidPro permissions for nginx"
      shell: |
        chmod -R a+rX {{ ai_update_rapidpro_dir }}/sitestatic {{ ai_update_rapidpro_dir }}/media 2>/dev/null || true
        chmod 755 {{ ai_update_rapidpro_dir }}/run 2>/dev/null || true
      become: yes
      changed_when: false
      when: "'rapidpro' not in ai_update_skip"

    - name: "Clean stale DynamoDB/ES spool files (local-first mode)"
      shell: rm -f {{ ai_update_rapidpro_dir }}/spool/*/dynamo/*.jsonl {{ ai_update_rapidpro_dir }}/spool/*/elastic/*.jsonl
      become: yes
      changed_when: false
      when:
        - "'rapidpro' not in ai_update_skip"
        - not (rapidpro_aws_enabled | default(false))

    - name: "Fix gateway .cache ownership for hermes service user"
      file:
        path: "{{ ai_update_gateway_dir }}/.cache"
        state: directory
        owner: hermes
        group: hermes
        recurse: yes
      become: yes
      changed_when: false
      failed_when: false

    # ═══════════════════════════════════════════════════════════════
    # STAGE 6: Grouped restarts
    # ═══════════════════════════════════════════════════════════════

    - name: Restart ai-gateway
      systemd:
        name: ai-gateway
        state: restarted
        daemon_reload: yes
      become: yes
      when: gateway_git_results.changed

    - name: Restart RiveBot
      systemd:
        name: rivebot
        state: restarted
      become: yes
      when: rivebot_git_result.changed | default(false)

    - name: Restart RapidPro services
      systemd:
        name: "{{ item }}"
        state: restarted
      become: yes
      loop:
        - rapidpro-gunicorn
        - rapidpro-celery
      when: rapidpro_git_result.changed | default(false)

    - name: Restart courier
      systemd:
        name: rapidpro-courier
        state: restarted
      become: yes
      when: courier_git_result.changed | default(false)

    - name: Restart mailroom
      systemd:
        name: rapidpro-mailroom
        state: restarted
      become: yes
      when: mailroom_git_result.changed | default(false)

    - name: Restart wuzapi
      systemd:
        name: wuzapi
        state: restarted
      become: yes
      when: wuzapi_binary_result.changed | default(false)

    # ═══════════════════════════════════════════════════════════════
    # STAGE 7: Register in iiab.ini + Report
    # ═══════════════════════════════════════════════════════════════

    - name: Add 'ai_update' variable values to {{ iiab_ini_file }}
      ini_file:
        path: "{{ iiab_ini_file }}"
        section: ai-update
        option: "{{ item.option }}"
        value: "{{ item.value | string }}"
      with_items:
        - option: name
          value: AI Update
        - option: description
          value: '"Unified update role for the cognitive pipeline"'
        - option: ai_update_install
          value: "{{ ai_update_install }}"
        - option: ai_update_enabled
          value: "{{ ai_update_enabled }}"
        - option: ai_update_last_run
          value: "{{ lookup('pipe', 'date --iso-8601=seconds') }}"
        - option: ai_update_skipped
          value: "{{ ai_update_skip | join(',') or 'none' }}"

    - name: Update complete
      debug:
        msg: "Cognitive pipeline updated. All changed services restarted."

  rescue:
    - name: 'UPDATE FAILED — SEE ERROR ABOVE'
      fail:
        msg: "Pipeline update failed. Check the error above. Some services may need manual restart."
