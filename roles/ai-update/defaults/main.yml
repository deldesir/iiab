---
ai_update_install: True
ai_update_enabled: True

# uv binary
ai_update_uv_bin: /root/.local/bin/uv

# ── Gateway cluster (shared venv, ONE uv sync, ONE restart) ────────
ai_update_gateway_dir: /opt/iiab/ai-gateway
ai_update_gateway_user: "{{ iiab_admin_user }}"

ai_update_gateway_components:
  - name: ai-gateway
    repo: "https://github.com/deldesir/gateway.git"
    dest: /opt/iiab/ai-gateway
    version: main

  # deldesir fork is the integration point (carries IIAB customizations + tested
  # upstream-feature syncs). Do NOT point this at nousresearch/hermes-agent —
  # that lineage has diverged ~2742 commits and a force-pull would clobber the fork.
  - name: hermes-agent
    repo: "https://github.com/deldesir/hermes-agent.git"
    dest: /opt/iiab/hermes-agent
    version: main

  # deldesir fork is the integration point. Upstream MemPalace/mempalace is synced
  # INTO this fork deliberately (feature-aware — e.g. the embeddinggemma default is
  # too heavy for 4 GB targets), not force-pulled here.
  - name: mempalace
    repo: "https://github.com/deldesir/mempalace.git"
    dest: /opt/iiab/mempalace
    version: develop

  - name: talkmaster
    repo: "https://github.com/deldesir/talkmaster.git"
    dest: /opt/iiab/talkmaster
    version: main

  - name: jwlinker
    repo: "https://github.com/deldesir/jwlinker.git"
    dest: /opt/iiab/jwlinker
    version: master

# ── RiveBot (own venv, own restart) ─────────────────────────────────
ai_update_rivebot_dir: /opt/iiab/rivebot
ai_update_rivebot_repo: "https://github.com/deldesir/rivebot.git"
ai_update_rivebot_version: main

# ── RapidPro (Django — needs migrations + static + patches) ────────
ai_update_rapidpro_dir: /opt/iiab/rapidpro
ai_update_rapidpro_repo: "https://github.com/deldesir/rapidpro.git"
ai_update_rapidpro_version: main

# ── Courier + Mailroom (Go — built from fork source) ───────────────
ai_update_courier_dir: /opt/iiab/courier
ai_update_courier_repo: "https://github.com/deldesir/courier.git"
ai_update_courier_version: main

ai_update_mailroom_dir: /opt/iiab/mailroom
ai_update_mailroom_repo: "https://github.com/deldesir/mailroom.git"
ai_update_mailroom_version: main

# ── Go services — download-first, build-from-source fallback ───────
ai_update_go_bin: /usr/local/go/bin/go

ai_update_arch_dict:
  x86_64: amd64
  aarch64: arm64

ai_update_go_arch: "{{ ai_update_arch_dict.get(ansible_facts.machine, 'unsupported') }}"

# Pre-built release URLs (tried first — fast, seconds)
ai_update_go_courier_url: "https://github.com/deldesir/courier/releases/latest/download/courier-linux-{{ ai_update_go_arch }}"
ai_update_go_mailroom_url: "https://github.com/deldesir/mailroom/releases/latest/download/mailroom-linux-{{ ai_update_go_arch }}"
ai_update_go_wuzapi_url: "https://github.com/deldesir/wuzapi/releases/latest/download/wuzapi-linux-{{ ai_update_go_arch }}"

# Binary destinations
ai_update_go_courier_dest: /usr/local/bin/courier
ai_update_go_mailroom_dest: /usr/local/bin/mailroom



# ── WuzAPI static assets ───────────────────────────────────────────
ai_update_wuzapi_src_repo: "https://github.com/deldesir/wuzapi.git"
ai_update_wuzapi_src_dir: /opt/iiab/wuzapi-src
ai_update_wuzapi_dir: /opt/iiab/wuzapi

# ── Skip list (set via -e to skip specific components) ─────────────
# Usage: ./runrole ai-update -e '{"ai_update_skip": ["wuzapi", "rapidpro"]}'
ai_update_skip: []
