---
siyuan_install: False
siyuan_enabled: False

# Version — set to 'latest' to automatically download the newest release, or pin a specific version
siyuan_version: "latest"

# Install location
siyuan_dir: /opt/iiab/siyuan-server
siyuan_user: "{{ iiab_admin_user }}"

# Service
siyuan_port: 6806

# Auth — set a code to protect the web UI (recommended on shared networks)
siyuan_access_auth_code: ""

# API token — used by other services (rivebot, ai-gateway) to talk to SiYuan
# Set in /etc/iiab/local_vars.yml; written to workspace/conf/conf.json at install time
siyuan_api_token: ""

# Workspace (where notebooks live)
siyuan_workspace: "{{ siyuan_dir }}/workspace"

# Architecture mapping for release tarballs
siyuan_arch_dict:
  x86_64: linux
  aarch64: linux-arm64

siyuan_arch: "{{ siyuan_arch_dict.get(ansible_facts.machine, 'linux') }}"
