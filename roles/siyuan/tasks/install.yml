---
# 'latest' resolves to the most recently *published* release of ANY kind,
# i.e. the newest pre-release (beta/rc) when it is more recent than the
# newest stable, otherwise the newest stable. We therefore list all releases
# (the /releases/latest endpoint hides pre-releases) and pick by published_at.
- name: Determine newest SiYuan release (including pre-releases) from GitHub
  uri:
    url: https://api.github.com/repos/siyuan-note/siyuan/releases?per_page=20
    return_content: yes
    headers:
      User-Agent: "IIAB"
  register: siyuan_releases
  when: siyuan_version == 'latest'

- name: Set siyuan_version to newest release (stable or pre-release, whichever is more recent)
  set_fact:
    siyuan_version: "{{ (siyuan_releases.json | rejectattr('draft') | sort(attribute='published_at') | list | last).tag_name | regex_replace('^v', '') }}"
  when: siyuan_version == 'latest'

# Migrate workspace from old location (/opt/iiab/siyuan-server/workspace)
# to /library/siyuan if notebooks exist at the old path
- name: Check for legacy workspace at old location
  stat:
    path: "{{ siyuan_dir }}/workspace/data"
  register: old_workspace

- name: Check if new workspace already has data
  stat:
    path: "{{ siyuan_workspace }}/data"
  register: new_workspace

- name: Migrate legacy workspace to {{ siyuan_workspace }}
  shell: |
    mkdir -p {{ siyuan_workspace }}
    cp -a {{ siyuan_dir }}/workspace/* {{ siyuan_workspace }}/
    mv {{ siyuan_dir }}/workspace {{ siyuan_dir }}/workspace.migrated
  become: yes
  when:
    - old_workspace.stat.exists | default(false)
    - not (new_workspace.stat.exists | default(false))

- name: Record (initial) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df1

- name: Create SiYuan directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ siyuan_user }}"
    group: "{{ siyuan_user }}"
    mode: '0755'
  become: yes
  loop:
    - "{{ siyuan_dir }}"
    - "{{ siyuan_workspace }}"

- name: Download SiYuan v{{ siyuan_version }} release tarball
  get_url:
    url: "https://github.com/siyuan-note/siyuan/releases/download/v{{ siyuan_version }}/siyuan-{{ siyuan_version }}-{{ siyuan_arch }}.tar.gz"
    dest: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
    mode: '0644'
  become: yes

# The release tarball is an Electron desktop bundle; we only need
# the resources/ subdirectory which contains:
#   kernel/SiYuan-Kernel  — the standalone Go HTTP server
#   appearance/           — UI themes, fonts, icons
#   stage/                — built frontend assets
#   guide/                — user guide notebook
#   changelogs/           — release notes

- name: Extract SiYuan server resources from tarball
  shell: >
    tar xzf "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
    --strip-components=2
    -C "{{ siyuan_dir }}"
    "siyuan-{{ siyuan_version }}-{{ siyuan_arch }}/resources"
  become: yes

- name: Make SiYuan kernel binary executable
  file:
    path: "{{ siyuan_dir }}/kernel/SiYuan-Kernel"
    mode: '0755'
  become: yes

- name: Clean up tarball
  file:
    path: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
    state: absent
  become: yes

- name: Set ownership of SiYuan directory
  file:
    path: "{{ siyuan_dir }}"
    owner: "{{ siyuan_user }}"
    group: "{{ siyuan_user }}"
    recurse: yes
    state: directory
  become: yes

- name: Install SiYuan systemd service
  template:
    src: siyuan.service.j2
    dest: /etc/systemd/system/siyuan.service
    mode: '0644'
  become: yes

- name: Ensure SiYuan workspace conf directory exists
  file:
    path: "{{ siyuan_workspace }}/conf"
    state: directory
    owner: "{{ siyuan_user }}"
    group: "{{ siyuan_user }}"
    mode: '0755'
  become: yes

- name: Set SiYuan API token in workspace conf
  shell: |
    python3 -c "
    import json, os
    conf_path = '{{ siyuan_workspace }}/conf/conf.json'
    conf = {}
    if os.path.exists(conf_path):
        with open(conf_path) as f:
            conf = json.load(f)
    conf.setdefault('api', {})['token'] = '{{ siyuan_api_token }}'
    with open(conf_path, 'w') as f:
        json.dump(conf, f, indent=2)
    "
  become: yes
  become_user: "{{ siyuan_user }}"
  when: siyuan_api_token | length > 0

# RECORD SiYuan AS INSTALLED

- name: Record (final) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df2

- name: Add 'siyuan_disk_usage = {{ df2.stdout | int - df1.stdout | int }}' to {{ iiab_ini_file }}
  ini_file:
    path: "{{ iiab_ini_file }}"
    section: siyuan
    option: siyuan_disk_usage
    value: "{{ df2.stdout | int - df1.stdout | int }}"

- name: "Set 'siyuan_installed: True'"
  set_fact:
    siyuan_installed: True

- name: "Add 'siyuan_installed: True' to {{ iiab_state_file }}"
  lineinfile:
    path: "{{ iiab_state_file }}"
    regexp: '^siyuan_installed'
    line: 'siyuan_installed: True'
