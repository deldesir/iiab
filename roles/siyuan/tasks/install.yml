---
- name: Create SiYuan directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ siyuan_user }}"
    group: "{{ siyuan_user }}"
    mode: '0755'
  become: yes
  loop:
    - "{{ siyuan_dir }}"
    - "{{ siyuan_workspace }}"

- name: Download SiYuan v{{ siyuan_version }} release tarball
  get_url:
    url: "https://github.com/siyuan-note/siyuan/releases/download/v{{ siyuan_version }}/siyuan-{{ siyuan_version }}-{{ siyuan_arch }}.tar.gz"
    dest: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
    mode: '0644'
  become: yes

- name: Extract SiYuan tarball to {{ siyuan_dir }}
  unarchive:
    src: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
    dest: "{{ siyuan_dir }}"
    remote_src: yes
    extra_opts: ['--strip-components=1']
    owner: "{{ siyuan_user }}"
    group: "{{ siyuan_user }}"
  become: yes

- name: Clean up tarball
  file:
    path: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
    state: absent
  become: yes

- name: Set ownership of SiYuan directory
  file:
    path: "{{ siyuan_dir }}"
    owner: "{{ siyuan_user }}"
    group: "{{ siyuan_user }}"
    recurse: yes
    state: directory
  become: yes

- name: Install SiYuan systemd service
  template:
    src: siyuan.service.j2
    dest: /etc/systemd/system/siyuan.service
    mode: '0644'
  become: yes

- name: Mark siyuan as installed in {{ iiab_state_file }}
  lineinfile:
    path: "{{ iiab_state_file }}"
    regexp: '^siyuan_installed'
    line: "siyuan_installed: True"
    create: yes
  become: yes
