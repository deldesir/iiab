---
- when: siyuan_install | bool
  become: yes
  block:

    - name: Create SiYuan directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ siyuan_user }}"
        group: "{{ siyuan_user }}"
        mode: '0755'
      loop:
        - "{{ siyuan_dir }}"
        - "{{ siyuan_workspace }}"

    - name: Download SiYuan release tarball
      get_url:
        url: "https://github.com/siyuan-note/siyuan/releases/download/v{{ siyuan_version }}/siyuan-{{ siyuan_version }}-{{ siyuan_arch }}.tar.gz"
        dest: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
        mode: '0644'
      register: siyuan_download

    - name: Extract SiYuan tarball
      unarchive:
        src: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
        dest: "{{ siyuan_dir }}"
        remote_src: yes
        extra_opts: ['--strip-components=1']
        owner: "{{ siyuan_user }}"
        group: "{{ siyuan_user }}"
      when: siyuan_download.changed
      notify: restart siyuan

    - name: Clean up tarball
      file:
        path: "/tmp/siyuan-{{ siyuan_version }}.tar.gz"
        state: absent

    - name: Set ownership of SiYuan directory
      file:
        path: "{{ siyuan_dir }}"
        owner: "{{ siyuan_user }}"
        group: "{{ siyuan_user }}"
        recurse: yes
        state: directory

    - name: Install SiYuan systemd service
      template:
        src: siyuan.service.j2
        dest: /etc/systemd/system/siyuan.service
        mode: '0644'
      notify: restart siyuan

    - name: Enable or disable SiYuan service
      systemd:
        name: siyuan
        state: "{{ 'started' if siyuan_enabled | bool else 'stopped' }}"
        enabled: "{{ siyuan_enabled | bool }}"
        daemon_reload: yes

    - name: Mark siyuan as installed in iiab_state.yml
      lineinfile:
        path: /etc/iiab/iiab_state.yml
        regexp: '^siyuan_installed'
        line: "siyuan_installed: True"
        create: yes
