---
email_bridge_install: False
email_bridge_enabled: False

# Install location
email_bridge_home: /opt/iiab/email-bridge
email_bridge_user: "{{ iiab_admin_user }}"
email_bridge_uv_bin: /root/.local/bin/uv
email_bridge_rapidpro_dir: /opt/iiab/rapidpro    # used to auto-create the channel

# Service
email_bridge_port: 8096

# ─────────────────────────────────────────────────────────────────────────────
# MINIMAL CONFIG — in /etc/iiab/local_vars.yml a user normally sets ONLY these 4:
#
#   email_bridge_install: True
#   email_bridge_enabled: True
#   email_bridge_smtp_user: bot@example.com      # the mailbox = the bot's address
#   email_bridge_smtp_pass: "<app-password>"
#
# Everything below is DERIVED from those: SMTP/IMAP hosts from the address
# domain, TLS from the port, the /send secret auto-generated, the RapidPro
# channel auto-created. Override a line in local_vars only if your provider
# is unusual.
# ─────────────────────────────────────────────────────────────────────────────

# ── SMTP (outgoing) ──────────────────────────────────────────────────────────
email_bridge_smtp_user: ""
email_bridge_smtp_pass: ""
email_bridge_smtp_port: 587            # 587 = STARTTLS, 465 = implicit TLS
# Host + TLS are derived — no need to set them for common providers:
email_bridge_mail_domain: "{{ email_bridge_smtp_user.split('@')[1] if '@' in email_bridge_smtp_user else '' }}"
email_bridge_smtp_host: "{{ email_bridge_known_providers.get(email_bridge_mail_domain, {}).get('smtp', 'smtp.' ~ email_bridge_mail_domain) if email_bridge_mail_domain else '' }}"
email_bridge_smtp_ssl: "{{ (email_bridge_smtp_port | int) == 465 }}"          # implicit TLS on 465
email_bridge_smtp_starttls: "{{ (email_bridge_smtp_port | int) != 465 }}"     # STARTTLS otherwise
email_bridge_from: "{{ email_bridge_smtp_user }}"      # the channel address (bot's email)
email_bridge_from_name: "Assistant"
email_bridge_subject: "Re: your message"

# ── IMAP (incoming, polled) ─────────────────────────────────────────────────
email_bridge_imap_host: "{{ email_bridge_known_providers.get(email_bridge_mail_domain, {}).get('imap', 'imap.' ~ email_bridge_mail_domain) if email_bridge_mail_domain else '' }}"
email_bridge_imap_port: 993
email_bridge_imap_user: "{{ email_bridge_smtp_user }}"
email_bridge_imap_pass: "{{ email_bridge_smtp_pass }}"
email_bridge_imap_folder: "INBOX"
email_bridge_poll_interval: 20
email_bridge_max_body: 8000
# Server-side sender scope: only forward inbound mail FROM these addresses
# (comma-separated; empty = forward all). Defaults to the email addresses in
# ai_gateway_authorized_users — one source of truth with the gateway's
# AUTHORIZED_USERS — so the watched mailbox may be shared/personal without any
# Gmail filter; other senders' mail is left untouched (unread). Override to pin.
email_bridge_allowed_senders: "{{ (ai_gateway_authorized_users | default('')).split(',') | map('regex_search', '[^,:]+@[^,:]+') | select('string') | join(',') }}"

# Known-provider host map (domain -> smtp/imap). Domains not listed here fall
# back to smtp.<domain> / imap.<domain>, which is correct for most hosted mail
# and cPanel/Plesk setups. Add an entry to extend.
email_bridge_known_providers:
  gmail.com:      { smtp: smtp.gmail.com,        imap: imap.gmail.com }
  googlemail.com: { smtp: smtp.gmail.com,        imap: imap.gmail.com }
  outlook.com:    { smtp: smtp-mail.outlook.com, imap: outlook.office365.com }
  hotmail.com:    { smtp: smtp-mail.outlook.com, imap: outlook.office365.com }
  live.com:       { smtp: smtp-mail.outlook.com, imap: outlook.office365.com }
  office365.com:  { smtp: smtp.office365.com,     imap: outlook.office365.com }
  yahoo.com:      { smtp: smtp.mail.yahoo.com,    imap: imap.mail.yahoo.com }
  fastmail.com:   { smtp: smtp.fastmail.com,      imap: imap.fastmail.com }
  icloud.com:     { smtp: smtp.mail.me.com,       imap: imap.mail.me.com }
  zoho.com:       { smtp: smtp.zoho.com,          imap: imap.zoho.com }
  gmx.com:        { smtp: mail.gmx.com,           imap: imap.gmx.com }
  yandex.com:     { smtp: smtp.yandex.com,        imap: imap.yandex.com }

# ── courier (RapidPro External channel) wiring ──────────────────────────────
# Auto-created by the role (idempotent get-or-create) when this is empty. Set a
# value only to pin a specific existing channel.
email_bridge_channel_uuid: ""
email_bridge_courier_base: "http://localhost:8080"
# Shared secret guarding the bridge's /send (courier presents it as the
# Authorization header). Auto-generated once and stored 0600 at
# /etc/iiab/email_bridge_send_auth.token; override to pin your own.
email_bridge_send_auth_token: "{{ lookup('password', iiab_etc_path ~ '/email_bridge_send_auth.token chars=ascii_letters,digits length=40') }}"
email_bridge_send_auth: "{{ email_bridge_send_auth_token }}"
email_bridge_sent_token: "SENT"        # must equal the channel's mt_response_check

# ── Attachments ──────────────────────────────────────────────────────────────
# Extra hosts (comma-sep) the bridge may fetch RapidPro media from; loopback +
# the courier host are always allowed. Set to your media host if served off-box.
email_bridge_attachment_hosts: ""
email_bridge_attachment_max_bytes: 20971520   # 20 MB (under Gmail's 25 MB cap)
# Inbound attachments from polled mail are persisted here (the gateway, same box,
# can read them) and their paths appended to the forwarded text.
email_bridge_inbound_dir: "{{ email_bridge_home }}/inbound"
email_bridge_save_inbound: True
