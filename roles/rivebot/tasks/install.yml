---
- name: Record (initial) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df1

- name: Install RiveBot system dependencies
  apt:
    name:
      - git
      - curl
    state: present
  become: yes

- name: Ensure uv is installed
  shell: which uv || curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ rivebot_uv_bin }}"
  become: yes

- name: Create RiveBot home directory
  file:
    path: "{{ rivebot_home }}"
    state: directory
    owner: "{{ rivebot_user }}"
    group: "{{ rivebot_user }}"
    mode: '0755'
  become: yes

- name: Check if rivebot directory is already safe
  command: git config --global --get-all safe.directory
  register: git_safe_dirs
  changed_when: false
  ignore_errors: yes

- name: Add rivebot directory to git safe directories
  command: git config --global --add safe.directory {{ rivebot_home }}
  become: yes
  when: rivebot_home not in (git_safe_dirs.stdout_lines | default([]))

- name: Clone / update RiveBot repository
  git:
    repo: "{{ rivebot_repo }}"
    dest: "{{ rivebot_home }}"
    version: "{{ rivebot_repo_version }}"
    force: yes
    update: yes
  become: yes
  notify: restart rivebot

- name: Set ownership of RiveBot directory
  file:
    path: "{{ rivebot_home }}"
    state: directory
    owner: "{{ rivebot_user }}"
    group: "{{ rivebot_user }}"
    recurse: yes
  become: yes

- name: Sync RiveBot Python dependencies (uv sync)
  command: "{{ rivebot_uv_bin }} sync"
  args:
    chdir: "{{ rivebot_home }}"
  become: yes
  environment:
    PATH: "/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

- name: Fix ownership after uv sync
  file:
    path: "{{ rivebot_home }}"
    state: directory
    owner: "{{ rivebot_user }}"
    group: "{{ rivebot_user }}"
    recurse: yes
  become: yes

- name: Deploy RiveBot environment file
  template:
    src: rivebot.env.j2
    dest: "{{ rivebot_home }}/.env"
    owner: "{{ rivebot_user }}"
    group: "{{ rivebot_user }}"
    mode: '0600'
  become: yes
  notify: restart rivebot

- name: Install RiveBot systemd service
  template:
    src: rivebot.service.j2
    dest: /etc/systemd/system/rivebot.service
    mode: '0644'
  become: yes
  notify: restart rivebot

# RECORD RiveBot AS INSTALLED

- name: Record (final) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df2

- name: Add 'rivebot_disk_usage = {{ df2.stdout | int - df1.stdout | int }}' to {{ iiab_ini_file }}
  ini_file:
    path: "{{ iiab_ini_file }}"
    section: rivebot
    option: rivebot_disk_usage
    value: "{{ df2.stdout | int - df1.stdout | int }}"

- name: "Set 'rivebot_installed: True'"
  set_fact:
    rivebot_installed: True

- name: "Add 'rivebot_installed: True' to {{ iiab_state_file }}"
  lineinfile:
    path: "{{ iiab_state_file }}"
    regexp: '^rivebot_installed'
    line: 'rivebot_installed: True'
