---
- name: Ensure rivebot directory exists
  file:
    path: "{{ rivebot_home }}"
    state: directory
    mode: '0755'

- name: Sync rivebot Python dependencies with uv
  command: uv sync
  args:
    chdir: "{{ rivebot_home }}"
  changed_when: false

- name: Write systemd unit
  template:
    src: rivebot.service.j2
    dest: /etc/systemd/system/rivebot.service
  notify: restart rivebot

- name: Enable and start rivebot service
  systemd:
    name: rivebot
    enabled: yes
    state: started
    daemon_reload: yes
