# MemPalace is an in-process library — no separate systemd service.
# Enable/disable controls whether the gateway loads the MemPalace memory layer.
# The actual service lifecycle is managed by the ai-gateway role.

- name: "Note: MemPalace has no separate service (in-process library)"
  debug:
    msg: "MemPalace runs inside ai-gateway process. Enable/disable managed via ai-gateway."
