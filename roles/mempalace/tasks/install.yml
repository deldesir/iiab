---
- name: Record (initial) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df1

- name: Add mempalace directory to git safe directories
  community.general.git_config:
    name: safe.directory
    scope: global
    value: "{{ mempalace_dir }}"
  become: yes

- name: Clone / update MemPalace repository
  git:
    repo: "{{ mempalace_repo }}"
    dest: "{{ mempalace_dir }}"
    version: "{{ mempalace_version }}"
    force: yes
    update: yes
  become: yes

- name: Set ownership of MemPalace directory
  file:
    path: "{{ mempalace_dir }}"
    state: directory
    owner: "{{ mempalace_user }}"
    group: "{{ mempalace_user }}"
    recurse: yes
  become: yes

# MemPalace is NOT installed here via `uv pip install`.
# Instead, it is declared in ai-gateway's pyproject.toml as a
# [tool.uv.sources] editable path (same pattern as talkmaster/jwlinker).
# The actual installation happens when ai-gateway runs `uv sync`.
# This prevents `uv sync` from silently uninstalling mempalace
# on gateway updates.

# Create the palace data directory where ChromaDB stores its SQLite + HNSW index.
#
# Upstream default: ~/.mempalace/palace (set via MEMPALACE_PALACE_PATH env var).
# Config priority: env var > config file (~/.mempalace/config.json) > default.
# We override via systemd Environment= to keep data inside the gateway's data/ dir.
- name: Initialize MemPalace palace directory
  file:
    path: "{{ mempalace_palace_path }}"
    state: directory
    owner: "{{ mempalace_user }}"
    group: "{{ mempalace_user }}"
    mode: '0755'
  become: yes

# Ensure sqlite3 CLI is available for the monthly VACUUM cron job
- name: Ensure sqlite3 CLI is available
  apt:
    name: sqlite3
    state: present
  become: yes

# Deploy monthly VACUUM cron for ChromaDB's internal SQLite database.
# ChromaDB uses SQLite for metadata storage (chroma.sqlite3 per backends/chroma.py);
# over time, deletes/updates leave dead pages that bloat the file.
# VACUUM reclaims this space.
# Runs at 03:00 AM on the 1st of each month when free disk > 3x DB size.
- name: Deploy ChromaDB VACUUM cron
  cron:
    name: "mempalace-vacuum"
    minute: "0"
    hour: "3"
    day: "1"
    job: >
      DB={{ mempalace_palace_path }}/chroma.sqlite3;
      DB_SIZE=$(stat -c%s "$DB" 2>/dev/null || echo 0);
      FREE_SPACE=$(df -k "$(dirname "$DB")" | awk 'NR==2 {print $4 * 1024}');
      [ "$FREE_SPACE" -gt $((DB_SIZE * 3)) ] && sqlite3 "$DB" "VACUUM;" || echo "VACUUM skipped: insufficient space" | logger -t mempalace
    user: "{{ mempalace_user }}"
  become: yes

# RECORD MEMPALACE AS INSTALLED

- name: Record (final) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df2

- name: Add 'mempalace_disk_usage = {{ df2.stdout | int - df1.stdout | int }}' to {{ iiab_ini_file }}
  ini_file:
    path: "{{ iiab_ini_file }}"
    section: mempalace
    option: mempalace_disk_usage
    value: "{{ df2.stdout | int - df1.stdout | int }}"

- name: "Set 'mempalace_installed: True'"
  set_fact:
    mempalace_installed: True

- name: "Add 'mempalace_installed: True' to {{ iiab_state_file }}"
  lineinfile:
    path: "{{ iiab_state_file }}"
    regexp: '^mempalace_installed'
    line: 'mempalace_installed: True'
