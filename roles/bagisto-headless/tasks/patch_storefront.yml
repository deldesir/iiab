---
# -------------------------------------------------------
# Deployment-specific patches for deldesir/storefront
#
# Most fixes (currency, routing, basePath, category nav,
# auth, cache, error handling) are baked into the fork.
# Only deployment-specific runtime wiring remains here.
# -------------------------------------------------------

# The GRAPHQL_URL must use the local server address for server-side
# rendering to avoid routing through Nginx (which causes proxy loops).
# This is deployment-specific because the Bagisto app URL path varies.
- name: Patch GRAPHQL_URL for server-side SSR to bypass Nginx proxy
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/constants.ts"
    regexp: "export const GRAPHQL_URL = `\\$\\{\\(process.env.NEXT_PUBLIC_BAGISTO_ENDPOINT \\|\\| ''\\)\\.replace\\(\\/\\\\\\\\/\\$\\/, ''\\)\\}\\$\\{BAGISTO_GRAPHQL_API_ENDPOINT\\}`;"
    replace: 'export const GRAPHQL_URL = typeof window === "undefined" ? "http://127.0.0.1{{ bagisto_app_url | regex_replace("^https?://[^/]+", "") | regex_replace("/$", "") }}/graphql-backend" : `${(process.env.NEXT_PUBLIC_BAGISTO_ENDPOINT || "").replace(/\/$/, "")}${BAGISTO_GRAPHQL_API_ENDPOINT}`;'
