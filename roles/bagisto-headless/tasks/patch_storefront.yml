---
- name: Inject basePath into next.config.ts
  replace:
    path: "{{ bagisto_headless_dir }}/next.config.ts"
    regexp: 'const nextConfig: NextConfig = \{'
    replace: 'const nextConfig: NextConfig = {\n  basePath: process.env.NEXT_BASE_PATH || "",'

- name: Patch utils/constants.ts for image fallback base URLs
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/constants.ts"
    regexp: 'export const (SIGNUP_IMG|SIGNIN_IMG|FORGET_PASSWORD_IMG|NOT_IMAGE) = "/image/([^"]*)";'
    replace: 'export const \1 = `${baseUrl}/image/\2`;'

- name: Patch utils/constants.ts to use internal backend URL for server-side fetches to avoid Nginx proxy loops
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/constants.ts"
    regexp: 'export const GRAPHQL_URL = `\$\{\(process.env.NEXT_PUBLIC_BAGISTO_ENDPOINT \|\| .\'\'\)\.replace\(\/\\\\/\$\/, .\'\'\)\}\$\{BAGISTO_GRAPHQL_API_ENDPOINT\}`;'
    replace: 'export const GRAPHQL_URL = typeof window === "undefined" ? "http://127.0.0.1{{ bagisto_app_url | regex_replace(\"^https?://[^/]+\", \"\") | regex_replace(\"/$\", \"\") }}/graphql-backend" : `${(process.env.NEXT_PUBLIC_BAGISTO_ENDPOINT || "").replace(/\\/$/, "")}${BAGISTO_GRAPHQL_API_ENDPOINT}`;'

- name: Patch utils/fetch-handler.ts to prepend basePath
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/fetch-handler.ts"
    regexp: 'const response = await fetch\(`/api/\$\{url\}`,'
    replace: 'const basePath = process.env.NEXT_PUBLIC_AUTH_BASEPATH || "";\n    const response = await fetch(`${basePath}/api/${url}`,'
    
- name: Patch utils/auth.ts to prepend basePath on custom pages
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/auth.ts"
    regexp: 'signIn: "/customer/login",'
    replace: 'signIn: (process.env.NEXT_PUBLIC_AUTH_BASEPATH || "") + "/customer/login",'
- name: Patch utils/auth.ts error page
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/auth.ts"
    regexp: 'error: "/login",'
    replace: 'error: (process.env.NEXT_PUBLIC_AUTH_BASEPATH || "") + "/customer/login",'

- name: Patch hooks/useCache.ts for faster revalidation
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/hooks/useCache.ts"
    regexp: 'return \d+; // \d+ hours'
    replace: 'return 60; // 1 minute'

- name: Patch app/(public)/page.tsx for 60s revalidation
  replace:
    path: "{{ bagisto_headless_dir }}/src/app/(public)/page.tsx"
    regexp: 'export const revalidate = 3600;'
    replace: 'export const revalidate = 60;'

- name: Patch providers/SessionManager.tsx to use local SessionProvider wrapper
  replace:
    path: "{{ bagisto_headless_dir }}/src/providers/SessionManager.tsx"
    regexp: 'import \{ SessionProvider \} from "next-auth/react";'
    replace: 'import { SessionProvider } from "./SessionProvider";'

- name: Remove hardcoded parentId for navbar categories
  replace:
    path: "{{ bagisto_headless_dir }}/src/components/layout/navbar/CategoriesMenu.tsx"
    regexp: '\{ parentId: 1 \}'
    replace: '{}'

- name: Remove hardcoded parentId for collections page
  replace:
    path: "{{ bagisto_headless_dir }}/src/app/(public)/search/[collection]/page.tsx"
    regexp: '\{ parentId: 1 \}'
    replace: '{}'

- name: Patch apollo-client.ts to prepend basePath on client side
  replace:
    path: "{{ bagisto_headless_dir }}/src/lib/apollo-client.ts"
    regexp: 'uri: ssrMode \? GRAPHQL_URL : "/api/graphql",'
    replace: 'uri: ssrMode ? GRAPHQL_URL : `${process.env.NEXT_PUBLIC_AUTH_BASEPATH || ""}/api/graphql`,'

- name: Patch GlobalProviders.tsx to wrap app in SessionProvider
  replace:
    path: "{{ bagisto_headless_dir }}/src/providers/GlobalProviders.tsx"
    regexp: 'export function GlobalProviders\(\{ children \}: \{ children: ReactNode \}\) \{\n  return \(\n    <ThemeProvider>'
    replace: "import { SessionProvider } from \"./SessionProvider\";\n\nexport function GlobalProviders({ children }: { children: ReactNode }) {\n  return (\n    <SessionProvider>\n      <ThemeProvider>"

- name: Patch GlobalProviders.tsx to close SessionProvider
  replace:
    path: "{{ bagisto_headless_dir }}/src/providers/GlobalProviders.tsx"
    regexp: '    </ThemeProvider>\n  \);\n\}'
    replace: "    </ThemeProvider>\n    </SessionProvider>\n  );\n}"

- name: Patch next.config.ts to ignore build errors
  replace:
    path: "{{ bagisto_headless_dir }}/next.config.ts"
    regexp: 'ignoreBuildErrors: false'
    replace: 'ignoreBuildErrors: true'

- name: Enable Next.js image optimization to fix sluggish UX
  replace:
    path: "{{ bagisto_headless_dir }}/next.config.ts"
    regexp: 'unoptimized: true,\s*remotePatterns: \[\],'
    replace: 'unoptimized: false, remotePatterns: [{ protocol: "http", hostname: "**" }, { protocol: "https", hostname: "**" }],'

- name: Force dynamic rendering in public layout
  replace:
    path: "{{ bagisto_headless_dir }}/src/app/layout.tsx"
    regexp: 'import \{ Inter \} from "next/font/google";'
    replace: "export const dynamic = 'force-dynamic';\nimport { Inter } from \"next/font/google\";"

- name: Force dynamic rendering in checkout layout
  replace:
    path: "{{ bagisto_headless_dir }}/src/app/(checkout)/layout.tsx"
    regexp: 'import \{ Inter \} from "next/font/google";'
    replace: "export const dynamic = 'force-dynamic';\nimport { Inter } from \"next/font/google\";"

- name: Create custom SessionProvider wrapper with basePath
  copy:
    dest: "{{ bagisto_headless_dir }}/src/providers/SessionProvider.tsx"
    content: |
      "use client";
      import { SessionProvider as NextAuthSessionProvider } from "next-auth/react";
      import { ReactNode } from "react";
      
      export function SessionProvider({ children }: { children: ReactNode }) {
        const basePath = (process.env.NEXT_PUBLIC_AUTH_BASEPATH || "") + "/api/auth";
        return <NextAuthSessionProvider basePath={basePath}>{children}</NextAuthSessionProvider>;
      }

# Fix GraphQL API route error handler: the upstream code returns Bagisto errors
# as HTTP 500, which crashes Apollo Client. This patch returns them as HTTP 200
# with a proper GraphQL `errors` array so the frontend can handle them gracefully.
- name: Fix GraphQL route error handler (return errors as 200, not 500)
  replace:
    path: "{{ bagisto_headless_dir }}/src/app/api/graphql/route.ts"
    regexp: '\} catch \(error\) \{\s+if \(isBagistoError\(error\)\) \{\s+return NextResponse\.json\(\s+\{\s+data: null,\s+error: error\.cause \?\? error,\s+\},\s+\{ status: 200 \}\s+\);\s+\}\s+return NextResponse\.json\(\s+\{\s+message: "Network error",\s+error: error instanceof Error \? error\.message : error,\s+\},\s+\{ status: 500 \}\s+\);\s+\}'
    replace: |
      } catch (error: any) {
              // If the error object has a message and extensions, it's likely the GraphQL error thrown by bagistoFetch
              if (error && typeof error === 'object' && error.message) {
                  return NextResponse.json(
                      {
                          data: null,
                          errors: [error],
                      },
                      { status: 200 }
                  );
              }

              // Generic fallback for network or unknown errors
              return NextResponse.json(
                  {
                      data: null,
                      errors: [
                          {
                              message: error instanceof Error ? error.message : "Unknown Error",
                              extensions: { originalError: error }
                          }
                      ]
                  },
                  { status: 200 }
              );
          }

# -------------------------------------------------------
# Currency: Replace hardcoded "USD" with env-driven constant
# -------------------------------------------------------

# Add CURRENCY_CODE export to constants.ts so all components can import it
- name: Add CURRENCY_CODE constant to constants.ts
  lineinfile:
    path: "{{ bagisto_headless_dir }}/src/utils/constants.ts"
    insertafter: "export const STOREFRONT_KEY"
    line: 'export const CURRENCY_CODE = process.env.NEXT_PUBLIC_DEFAULT_CURRENCY || "HTG";'

# Fix the x-currency header in the Bagisto GraphQL fetch client
- name: Patch bagisto fetch x-currency header to use CURRENCY_CODE
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/bagisto/index.ts"
    regexp: '"x-currency": "USD"'
    replace: '"x-currency": process.env.NEXT_PUBLIC_DEFAULT_CURRENCY || "HTG"'

# Fix the Price component default
- name: Patch Price component default currency
  replace:
    path: "{{ bagisto_headless_dir }}/src/components/theme/ui/Price.tsx"
    regexp: 'currencyCode = "USD"'
    replace: 'currencyCode = "HTG"'

# Fix safeCurrencyCode fallback in helper.ts
- name: Patch safeCurrencyCode fallback in helper.ts
  replace:
    path: "{{ bagisto_headless_dir }}/src/utils/helper.ts"
    regexp: '  return "USD";'
    replace: '  return "HTG";'

# Replace all hardcoded currencyCode={"USD"} props across components
- name: Replace hardcoded currencyCode USD in all components
  shell: |
    find {{ bagisto_headless_dir }}/src/components -name "*.tsx" \
      -exec sed -i 's/currencyCode={"USD"}/currencyCode={"HTG"}/g' {} +
    find {{ bagisto_headless_dir }}/src/components -name "*.tsx" \
      -exec sed -i "s/currencyCode: \"USD\"/currencyCode: \"HTG\"/g" {} +
    find {{ bagisto_headless_dir }}/src/components -name "*.tsx" \
      -exec sed -i "s/currencyCode: 'USD'/currencyCode: 'HTG'/g" {} +
    find {{ bagisto_headless_dir }}/src/components -name "*.tsx" \
      -exec sed -i 's/currency="USD"/currency="HTG"/g' {} +
  changed_when: true
