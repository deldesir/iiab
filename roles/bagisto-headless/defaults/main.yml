---
bagisto_headless_install: False
bagisto_headless_enabled: False
bagisto_headless_repo: "https://github.com/bagisto/nextjs-commerce.git"
bagisto_headless_version: "main"
bagisto_headless_dir: "/library/nextjs-commerce"
bagisto_headless_port: 3001
bagisto_api_package: "bagisto/bagisto-api:dev-main"
bagisto_headless_user: "{{ iiab_admin_user }}"
# bagisto_abs_path and bagisto_app_url must be defined here because Ansible
# does not carry over defaults from previous independent roles in the play.
bagisto_app_url: http://box/bagisto
bagisto_install_path: /library
bagisto_abs_path: "{{ bagisto_install_path }}/bagisto"
